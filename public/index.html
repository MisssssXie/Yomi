<script>
/* ──────────────────────────────────────────────────────────
   Yomi · vanilla JS implementation wired to existing API
   ────────────────────────────────────────────────────────── */

const $ = (s, root) => (root || document).querySelector(s);
const $$ = (s, root) => Array.from((root || document).querySelectorAll(s));

// ── State ──────────────────────────────────────────────────
let state = {
  view: 'idle',                // idle | recording | processing | summary | error
  recording: false,
  seconds: 0,
  recordingStartedAt: null,
  records: [],                 // list summaries from /api/meetings
  currentMeetingId: null,
  currentMeeting: null,        // full meeting object
  searchQuery: '',
  transcriptOpen: false,
  openSources: {},             // {index: bool} 摘要頁音源摺疊狀態
  appendingTo: null,           // 若不為 null，handleStop 會把音檔加到此 meeting 而非新建
  sourceModal: null,           // { kind, mode } | null 通用來源 modal
  theme: localStorage.getItem('yomi-theme') || 'day',
  mascot: localStorage.getItem('yomi-mascot') || 'neko',  // 'neko' | 'tsuki'
  mode: localStorage.getItem('yomi-mode') || 'meeting',   // 'meeting' | 'class' — 影響下一次新建卷
  lastAnimatedMeeting: null,   // 摘要 enter 動畫只在切換到不同卷時播放，避免每次 toggle source 都重播
  switchingMode: false,        // 摘要頁切換 mode 中
};

let timerInterval = null;
let waveformInterval = null;
let snippetInterval = null;
let snippetIndex = 0;
let currentEventSource = null;
let lastRenderedView = null;   // 用來判斷是否同一個 view 內的局部更新（避免 processing 間動畫重播）

const SNIPPETS = [
  '正在聆聽錄音的呼吸…',
  '辨識說話人的聲線…',
  '抓取對話中的關鍵承諾…',
  '梳理重點與下一步行動…',
  '蓋上月影之印…',
];

// ── Helpers ────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}
function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric' });
  } catch { return ''; }
}
function fmtDateTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('zh-TW', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function notebookLmUrl(id) {
  return `https://notebooklm.google.com/notebook/${encodeURIComponent(id)}`;
}

// 舊摘要把 `## 行動項目` 改名為 `## 待辦事項`（新版 SUMMARY_PROMPT 已直接吐後者）
function renameLegacyHeaders(src) {
  if (!src) return '';
  return String(src).replace(/^(##\s*)行動項目/gm, '$1待辦事項');
}

function renderMarkdown(src) {
  if (!src) return '';
  const lines = String(src).replace(/\r\n?/g, '\n').split('\n');
  let html = '';
  let i = 0;
  const inline = s => escapeHtml(s)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
  while (i < lines.length) {
    const line = lines[i];
    if (/^##\s+/.test(line)) {
      html += `<h2>${inline(line.replace(/^##\s+/, ''))}</h2>`;
      i++; continue;
    }
    if (/^#\s+/.test(line)) {
      html += `<h2>${inline(line.replace(/^#\s+/, ''))}</h2>`;
      i++; continue;
    }
    if (/^\|/.test(line) && i + 1 < lines.length && /^\|[\s\-:|]+\|?\s*$/.test(lines[i + 1])) {
      const headers = line.replace(/^\||\|$/g, '').split('|').map(s => s.trim());
      i += 2;
      const rows = [];
      while (i < lines.length && /^\|/.test(lines[i])) {
        const cells = lines[i].replace(/^\||\|$/g, '').split('|').map(s => s.trim());
        if (cells.every(c => /^\.{2,}$|^$/.test(c))) { i++; continue; }
        rows.push(cells); i++;
      }
      html += '<table><thead><tr>'
        + headers.map(h => `<th>${inline(h)}</th>`).join('')
        + '</tr></thead><tbody>'
        + rows.map(r => '<tr>' + r.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>').join('')
        + '</tbody></table>';
      continue;
    }
    if (/^[-*]\s+/.test(line)) {
      html += '<ul>';
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        html += `<li>${inline(lines[i].replace(/^[-*]\s+/, ''))}</li>`;
        i++;
      }
      html += '</ul>'; continue;
    }
    if (/^\d+\.\s+/.test(line)) {
      html += '<ol>';
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        html += `<li>${inline(lines[i].replace(/^\d+\.\s+/, ''))}</li>`;
        i++;
      }
      html += '</ol>'; continue;
    }
    if (!line.trim()) { i++; continue; }
    let para = line;
    i++;
    while (i < lines.length && lines[i].trim() && !/^(#{1,2}\s|[-*]\s|\d+\.\s|\|)/.test(lines[i])) {
      para += ' ' + lines[i]; i++;
    }
    html += `<p>${inline(para)}</p>`;
  }
  return html;
}
function recordTagFor(stage) {
  if (stage === 'done') return 'jade';
  if (stage === 'error') return 'seal';
  if (stage === 'cancelled') return 'moon';
  if (stage === 'queued') return 'moon';
  return 'sakura';
}
function stageLabel(stage) {
  return ({
    queued: '待入夢',
    creating: '結印',
    uploading: '上傳',
    appending: '續印',
    transcribing: '解讀',
    summarizing: '凝練',
    done: '已封印',
    error: '崩印',
    cancelled: '已止印',
  })[stage] || stage || '';
}

// ── Mascot SVG ─────────────────────────────────────────────
// kind: 'neko' (ninja kitten) | 'tsuki' (moon rabbit)
// mode: 'idle' | 'recording' | 'processing'
function mascotSvg(mode = 'idle', blinking = false, kind = 'neko', size = 168) {
  const isClosed = mode === 'processing' || blinking;
  const isFocused = mode === 'recording';
  const fur = 'var(--ink)';
  const inner = 'var(--paper)';
  const headband = 'var(--seal)';
  const moon = 'var(--moon)';

  if (kind === 'tsuki') {
    // Moon rabbit — tall pink-lined ears, mask band across eyes
    const mask = 'var(--paper-3)';
    let eyes = '';
    if (isClosed) {
      eyes = `
        <path d="M 76 95 Q 84 100 92 95" stroke="${fur}" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M 108 95 Q 116 100 124 95" stroke="${fur}" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;
    } else if (isFocused) {
      eyes = `
        <ellipse cx="84" cy="95" rx="5" ry="6" fill="${fur}"/>
        <ellipse cx="116" cy="95" rx="5" ry="6" fill="${fur}"/>
        <circle cx="86" cy="93" r="1.6" fill="${inner}"/>
        <circle cx="118" cy="93" r="1.6" fill="${inner}"/>`;
    } else {
      eyes = `
        <ellipse cx="84" cy="95" rx="4.5" ry="6.5" fill="${fur}"/>
        <ellipse cx="116" cy="95" rx="4.5" ry="6.5" fill="${fur}"/>
        <circle cx="85" cy="93" r="1.8" fill="${inner}"/>
        <circle cx="117" cy="93" r="1.8" fill="${inner}"/>`;
    }
    return `
      <svg viewBox="0 0 200 200" width="${size}" height="${size}" style="overflow:visible">
        <ellipse cx="100" cy="172" rx="50" ry="6" fill="${fur}" opacity="0.12"/>
        <ellipse cx="78" cy="38" rx="11" ry="28" fill="${fur}"/>
        <ellipse cx="122" cy="38" rx="11" ry="28" fill="${fur}"/>
        <ellipse cx="78" cy="40" rx="5" ry="20" fill="var(--sakura)"/>
        <ellipse cx="122" cy="40" rx="5" ry="20" fill="var(--sakura)"/>
        <circle cx="100" cy="100" r="58" fill="${fur}"/>
        <circle cx="74" cy="118" r="8" fill="var(--sakura)" opacity="0.7"/>
        <circle cx="126" cy="118" r="8" fill="var(--sakura)" opacity="0.7"/>
        <rect x="50" y="84" width="100" height="22" rx="11" fill="${mask}" opacity="0.95"/>
        <circle cx="100" cy="78" r="5" fill="${moon}"/>
        ${eyes}
        <ellipse cx="100" cy="120" rx="3" ry="2" fill="var(--sakura)"/>
        <path d="M 100 122 Q 95 128 91 126" stroke="${fur}" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 100 122 Q 105 128 109 126" stroke="${fur}" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>`;
  }

  // Default: ninja kitten
  let eyes = '';
  if (isClosed) {
    eyes = `
      <path d="M 72 102 Q 82 110 92 102" stroke="${inner}" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 108 102 Q 118 110 128 102" stroke="${inner}" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  } else if (isFocused) {
    eyes = `
      <ellipse cx="82" cy="104" rx="6" ry="4" fill="${inner}"/>
      <ellipse cx="118" cy="104" rx="6" ry="4" fill="${inner}"/>
      <circle cx="83" cy="104" r="2.4" fill="${fur}"/>
      <circle cx="119" cy="104" r="2.4" fill="${fur}"/>`;
  } else {
    eyes = `
      <ellipse cx="82" cy="104" rx="7" ry="9" fill="${inner}"/>
      <ellipse cx="118" cy="104" rx="7" ry="9" fill="${inner}"/>
      <ellipse cx="83" cy="106" rx="3.5" ry="4.5" fill="${fur}"/>
      <ellipse cx="119" cy="106" rx="3.5" ry="4.5" fill="${fur}"/>
      <circle cx="84" cy="103" r="1.4" fill="${inner}"/>
      <circle cx="120" cy="103" r="1.4" fill="${inner}"/>`;
  }

  return `
    <svg viewBox="0 0 200 200" width="${size}" height="${size}" style="overflow:visible">
      <ellipse cx="100" cy="172" rx="50" ry="6" fill="${fur}" opacity="0.12"/>
      <path d="M 50 70 L 60 28 L 86 56 Z" fill="${fur}"/>
      <path d="M 150 70 L 140 28 L 114 56 Z" fill="${fur}"/>
      <path d="M 60 56 L 64 38 L 78 52 Z" fill="var(--sakura)"/>
      <path d="M 140 56 L 136 38 L 122 52 Z" fill="var(--sakura)"/>
      <circle cx="100" cy="100" r="58" fill="${fur}"/>
      <rect x="40" y="62" width="120" height="14" fill="${headband}"/>
      <rect x="40" y="62" width="120" height="2" fill="rgba(0,0,0,0.18)"/>
      <g transform="translate(155 64) rotate(28)">
        <rect x="0" y="0" width="6" height="34" fill="${headband}"/>
        <rect x="0" y="0" width="6" height="3" fill="rgba(0,0,0,0.18)"/>
      </g>
      <g transform="translate(160 70) rotate(40)">
        <rect x="0" y="0" width="5" height="26" fill="${headband}" opacity="0.85"/>
      </g>
      <circle cx="100" cy="69" r="6.5" fill="${moon}"/>
      <circle cx="70" cy="120" r="9" fill="var(--sakura)" opacity="0.55"/>
      <circle cx="130" cy="120" r="9" fill="var(--sakura)" opacity="0.55"/>
      ${eyes}
      <path d="M 96 126 L 104 126 L 100 131 Z" fill="var(--sakura)"/>
      <path d="M 100 131 Q 94 138 89 134" stroke="${inner}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M 100 131 Q 106 138 111 134" stroke="${inner}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="40" y1="120" x2="58" y2="122" stroke="${inner}" stroke-width="1.2" opacity="0.6"/>
      <line x1="40" y1="128" x2="58" y2="128" stroke="${inner}" stroke-width="1.2" opacity="0.6"/>
      <line x1="160" y1="120" x2="142" y2="122" stroke="${inner}" stroke-width="1.2" opacity="0.6"/>
      <line x1="160" y1="128" x2="142" y2="128" stroke="${inner}" stroke-width="1.2" opacity="0.6"/>
    </svg>`;
}

function recIconSvg(tag) {
  if (tag === 'moon')
    return `<svg width="14" height="14" viewBox="0 0 16 16"><circle cx="9" cy="8" r="5.5" fill="currentColor"/><circle cx="11" cy="7" r="4.4" fill="var(--paper-3)"/></svg>`;
  if (tag === 'sakura')
    return `<svg width="14" height="14" viewBox="0 0 16 16">${
      [0,72,144,216,288].map(r => `<ellipse cx="8" cy="4" rx="1.8" ry="3" fill="currentColor" transform="rotate(${r} 8 8)"/>`).join('')
    }<circle cx="8" cy="8" r="1.4" fill="var(--moon)"/></svg>`;
  if (tag === 'jade')
    return `<svg width="14" height="14" viewBox="0 0 16 16"><path d="M3 13 L13 13 L11 6 L8 3 L5 6 Z" fill="currentColor"/></svg>`;
  if (tag === 'seal')
    return `<svg width="14" height="14" viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" rx="2" fill="currentColor"/></svg>`;
  return `<svg width="14" height="14" viewBox="0 0 16 16"><circle cx="8" cy="8" r="3" fill="currentColor"/></svg>`;
}

// ── Mascot picker ──────────────────────────────────────────
const MASCOT_OPTS = [
  { kind: 'neko', name: '忍 貓' },
  { kind: 'tsuki', name: '月 兔' },
];

// 不帶空格的版本，用在句子裡（如「輕觸月兔」），帶空格的版本用在標籤
function mascotName(spaced = false) {
  const opt = MASCOT_OPTS.find(o => o.kind === state.mascot);
  const fallback = spaced ? '忍 貓' : '忍貓';
  if (!opt) return fallback;
  return spaced ? opt.name : opt.name.replace(/\s+/g, '');
}

function renderMascotPill() {
  const av = $('#mascot-pill-avatar');
  const nm = $('#mascot-pill-name');
  if (!av || !nm) return;
  av.innerHTML = mascotSvg('idle', false, state.mascot, 30);
  const opt = MASCOT_OPTS.find(o => o.kind === state.mascot);
  nm.textContent = opt ? opt.name : '';
}

function renderMascotPicker() {
  const el = $('#mascot-picker');
  if (!el) return;
  el.innerHTML = MASCOT_OPTS.map(o => `
    <button class="mascot-option${state.mascot === o.kind ? ' active' : ''}" data-kind="${o.kind}" title="${o.name}">
      ${mascotSvg('idle', false, o.kind, 44)}
      <span class="name">${o.name}</span>
    </button>
  `).join('');
  $$('#mascot-picker .mascot-option').forEach(b => {
    b.addEventListener('click', () => {
      const k = b.dataset.kind;
      if (k === state.mascot) return;
      state.mascot = k;
      localStorage.setItem('yomi-mascot', k);
      renderMascotPicker();
      renderMascotPill();
      renderStage();
    });
  });
}

// ── Theme toggle ───────────────────────────────────────────
function applyTheme(theme) {
  state.theme = theme;
  document.documentElement.setAttribute('data-theme', theme === 'night' ? 'night' : 'day');
  localStorage.setItem('yomi-theme', theme);
  const next = theme === 'night' ? 'day' : 'night';
  const iconSlot = $('#theme-icon-slot');
  const labelSlot = $('#theme-label-slot');
  if (iconSlot) {
    iconSlot.innerHTML = theme === 'night'
      ? `<svg width="14" height="14" viewBox="0 0 16 16"><circle cx="8" cy="8" r="3.5" fill="currentColor"/><g stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="8" y1="1.5" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="14.5"/><line x1="1.5" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="14.5" y2="8"/></g></svg>`
      : `<svg width="14" height="14" viewBox="0 0 16 16"><path d="M11 2 a6 6 0 1 0 3 11 a5 5 0 0 1 -3 -11 Z" fill="currentColor"/></svg>`;
  }
  if (labelSlot) labelSlot.textContent = theme === 'night' ? '日 · Day' : '夜 · Night';

// ── API ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  const ct = r.headers.get('content-type') || '';
  const data = ct.includes('json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((data && data.error) || 'unknown error');
  return data;
}

// ── Render ─────────────────────────────────────────────────
function deriveView() {
  if (state.recording) return 'recording';
  if (!state.currentMeeting) return 'idle';
  const s = state.currentMeeting.stage;
  if (s === 'done') return 'summary';
  if (s === 'error' || s === 'cancelled') return 'error';
  return 'processing';
}

function render() {
  state.view = deriveView();
  renderSidebar();
  renderStage();
}

function renderSidebar() {
  const list = $('#records-list');
  const q = state.searchQuery.trim().toLowerCase();
  const filtered = q
    ? state.records.filter(r => (r.title || '').toLowerCase().includes(q))
    : state.records;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="record-empty">${q ? '查無符合的卷軸' : '尚無封存的卷軸'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const tag = recordTagFor(r.stage);
    const active = r.id === state.currentMeetingId ? ' active' : '';
    const date = fmtDate(r.createdAt);
    const stageTxt = stageLabel(r.stage);
    return `
      <div class="record${active}" data-id="${r.id}">
        <div class="record-icon tag-${tag}">${recIconSvg(tag)}</div>
        <div style="min-width:0">
          <div class="record-title">${escapeHtml(r.title)}</div>
          <div class="record-meta">
            ${date ? `<span>${escapeHtml(date)}</span>` : ''}
            ${date && stageTxt ? `<span style="opacity:0.4">·</span>` : ''}
            <span class="record-dur">${escapeHtml(stageTxt)}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  $$('#records-list .record').forEach(el => {
    el.addEventListener('click', () => handleSelect(Number(el.dataset.id)));
  });
}

function renderStage() {
  const body = $('#stage-body');

  // 同樣留在 processing：只局部更新四步驟，保留忍貓／月兔的調動忍術靈魂動畫
  if (state.view === 'processing' && lastRenderedView === 'processing') {
    updateProcessingPartial();
    lastRenderedView = state.view;
    return;
  }

  if (state.view === 'idle') body.innerHTML = tplIdle();
  else if (state.view === 'recording') body.innerHTML = tplRecording();
  else if (state.view === 'processing') body.innerHTML = tplProcessing();
  else if (state.view === 'summary') body.innerHTML = tplSummary();
  else if (state.view === 'error') body.innerHTML = tplError();

  // 待機畫面要鋪滿視口、不滾動；其他 view 維持原本可捲動
  body.classList.toggle('idle', state.view === 'idle');

  wireStage();
  startSubsystemsForView();

  // 摘要 enter 動畫只在切換到不同卷時播放一次；同卷後續 render（toggle source 等）不重播
  if (state.view === 'summary' && state.currentMeeting) {
    state.lastAnimatedMeeting = state.currentMeeting.id;
  }

  lastRenderedView = state.view;
}

// 在 processing → processing 切換時只刷新四步驟與標題，
// 避免 body.innerHTML 重設導致 mascot-wrap 的 keyframe 動畫全部重播。
function updateProcessingPartial() {
  const m = state.currentMeeting || {};
  const steps = buildSteps(m.stage);

  const stepsEl = $('.processing-card .steps');
  if (stepsEl) {
    stepsEl.innerHTML = steps.map((s, i) => `
      <div class="step ${s.state}">
        <div class="num">${s.state === 'done' ? '✓' : (i + 1)}</div>
        <div>${s.label}</div>
        ${s.state === 'active' ? '<div class="spinner"></div>' : ''}
        ${s.state === 'done' ? '<div class="check">已完成</div>' : ''}
      </div>
    `).join('');
  }

  const titleEl = $('.processing-card > div:first-child');
  if (titleEl) titleEl.textContent = m.title || '處理中';
}

// ── Build processing steps from stage ──────────────────────
function buildSteps(stage) {
  const isAppending = state.currentMeeting?.stage === 'appending'
    || (state.currentMeeting?.sources?.length > 1 && stage !== 'done' && stage !== 'error' && stage !== 'cancelled');
  const order = isAppending
    ? ['續封新一段音源', '聆聽轉錄新段落', '重整全卷摘要', '蓋上月影之印 · 完成卷軸']
    : ['封存音檔 · 加密保存', '聆聽轉錄 · 含說話人辨識', '月讀閱讀 · 抓取重點與行動項', '蓋上月影之印 · 完成卷軸'];
  const map = {
    queued:       0,
    creating:     0,
    uploading:    0,
    appending:    0,
    transcribing: 1,
    summarizing:  2,
    done:         4,
    error:        -1,
  };
  const idx = map[stage] ?? 0;
  return order.map((label, i) => {
    let st = 'todo';
    if (stage === 'error') st = i === Math.max(0, idx) ? 'error' : 'todo';
    else if (i < idx) st = 'done';
    else if (i === idx) st = 'active';
    return { label, state: st };
  });
}

// ── Wire interactions per view ─────────────────────────────
function wireStage() {
  // Idle
  const mascotBtn = $('#mascot-btn');
  if (mascotBtn) mascotBtn.addEventListener('click', handleStart);
  const btnStart = $('#btn-start');
  if (btnStart) btnStart.addEventListener('click', handleStart);
  const btnUpload = $('#btn-upload');
  if (btnUpload) btnUpload.addEventListener('click', () => $('#file-input').click());
  const helperUpload = $('#helper-upload');
  if (helperUpload) helperUpload.addEventListener('click', () => $('#file-input').click());
  const dz = $('#dropzone');
  if (dz) {
    ['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
    ['dragleave', 'drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); }));
    dz.addEventListener('drop', e => {
      const f = e.dataTransfer?.files?.[0];
      if (f) handleUpload(f);
    });
  }
  $$('.mode-opt').forEach(b => {
    b.addEventListener('click', () => {
      const next = b.dataset.mode === 'class' ? 'class' : 'meeting';
      if (next === state.mode) return;
      state.mode = next;
      localStorage.setItem('yomi-mode', next);
      renderStage();
    });
  });

  // Recording
  const btnStop = $('#btn-stop');
  if (btnStop) btnStop.addEventListener('click', handleStop);

  // Processing / Error
  const btnBack = $('#btn-back');
  if (btnBack) btnBack.addEventListener('click', handleBackToIdle);
  const btnCancel = $('#btn-cancel');
  if (btnCancel) btnCancel.addEventListener('click', handleCancel);

  // Summary
  $$('.source-hd').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.source-action-btn')) return; // 讓 rename / delete 自己處理
      const idx = Number(el.dataset.toggle);
      state.openSources[idx] = !state.openSources[idx];
      renderStage();
    });
  });
  $$('.source-action-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = Number(btn.dataset.idx);
      const action = btn.dataset.action;
      if (action === 'rename') handleSourceRename(idx);
      else if (action === 'delete') handleSourceDelete(idx);
    });
  });
  const btnResummarize = $('#btn-resummarize');
  if (btnResummarize) btnResummarize.addEventListener('click', handleResummarize);

  const btnSwitchMode = $('#btn-switch-mode');
  if (btnSwitchMode) btnSwitchMode.addEventListener('click', handleSwitchMode);

  // Source pickers (Idle + Append)
  wireSourcePicker('btn-source-create', 'create');
  wireSourcePicker('btn-source-append', 'append');

  const btnDismiss = $('#btn-dismiss-append-error');
  if (btnDismiss) btnDismiss.addEventListener('click', handleDismissAppendError);

  const btnDelete = $('#btn-delete');
  if (btnDelete) btnDelete.addEventListener('click', handleDelete);
  const btnNew = $('#btn-new');
  if (btnNew) btnNew.addEventListener('click', handleBackToIdle);

  const titleEl = $('#scroll-title');
  if (titleEl) {
    let original = titleEl.textContent;
    titleEl.addEventListener('focus', () => { original = titleEl.textContent; });
    titleEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
      else if (e.key === 'Escape') { e.preventDefault(); titleEl.textContent = original; titleEl.blur(); }
    });
    titleEl.addEventListener('blur', async () => {
      const next = titleEl.textContent.trim();
      if (!next) { titleEl.textContent = original; return; }
      if (next === original) return;
      await handleRenameTitle(next, original, titleEl);
    });
  }
}

// ── Subsystems (timer, waveform, snippet) ──────────────────
function startSubsystemsForView() {
  stopAllSubsystems();

  if (state.view === 'recording') {
    startTimer();
    startWaveform();
  } else if (state.view === 'processing') {
    startSnippetCycle();
  }
}
function stopAllSubsystems() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (waveformInterval) { clearInterval(waveformInterval); waveformInterval = null; }
  if (snippetInterval) { clearInterval(snippetInterval); snippetInterval = null; }
}

function startTimer() {
  const tick = () => {
    state.seconds = Math.floor((Date.now() - state.recordingStartedAt) / 1000);
    const txt = $('#timer-text');
    if (txt) txt.textContent = fmtTime(state.seconds);
  };
  tick();
  timerInterval = setInterval(tick, 1000);
}

function startWaveform() {
  const wf = $('#waveform');
  if (!wf) return;
  const bars = $$('.bar', wf);
  const n = bars.length;
  waveformInterval = setInterval(() => {
    const now = Date.now();
    bars.forEach((b, i) => {
      const base = 0.3 + 0.3 * Math.sin(now / 320 + i * 0.45);
      const noise = Math.random() * 0.6;
      const v = Math.min(1, Math.max(0.12, base * 0.5 + noise * 0.6));
      b.style.height = `${Math.round(v * 60)}px`;
    });
  }, 90);
}

function startSnippetCycle() {
  const el = $('#snippet');
  if (!el) return;
  snippetIndex = 0;
  snippetInterval = setInterval(() => {
    // Prefer server stageMsg if changing; else cycle snippets
    const m = state.currentMeeting;
    let text = SNIPPETS[snippetIndex % SNIPPETS.length];
    if (m && m.stageMsg) text = m.stageMsg;
    snippetIndex++;
    el.style.opacity = '0';
    setTimeout(() => {
      el.textContent = `「${text}」`;
      el.style.opacity = '';
    }, 200);
  }, 2200);
}

// ── Handlers ───────────────────────────────────────────────
// 瀏覽器端錄音，避免 macOS QuickTime 沙盒。
// 優先選 audio/mp4 (Safari)，次選 audio/webm;codecs=opus (Chrome/Edge)，再來 audio/ogg
const MIME_CANDIDATES = [
  { mime: 'audio/mp4', ext: 'm4a' },
  { mime: 'audio/mp4;codecs=mp4a.40.2', ext: 'm4a' },
  { mime: 'audio/webm;codecs=opus', ext: 'webm' },
  { mime: 'audio/webm', ext: 'webm' },
  { mime: 'audio/ogg;codecs=opus', ext: 'ogg' },
];
function pickRecorderFormat() {
  if (typeof MediaRecorder === 'undefined') return null;
  for (const c of MIME_CANDIDATES) {
    if (MediaRecorder.isTypeSupported(c.mime)) return c;
  }
  return { mime: '', ext: 'webm' };
}

let mediaRecorder = null;
let mediaStream = null;
let recordedChunks = [];
let recordedExt = 'webm';

async function handleStart() {
  if (state.recording) return;
  const fmt = pickRecorderFormat();
  if (!fmt) {
    alert('這個瀏覽器不支援 MediaRecorder，請改用 Chrome / Safari / Edge 最新版。');
    return;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    mediaRecorder = fmt.mime ? new MediaRecorder(mediaStream, { mimeType: fmt.mime }) : new MediaRecorder(mediaStream);
    recordedExt = fmt.ext;
    recordedChunks = [];
    mediaRecorder.addEventListener('dataavailable', e => {
      if (e.data && e.data.size > 0) recordedChunks.push(e.data);
    });
    mediaRecorder.start(1000);
    state.recording = true;
    state.recordingStartedAt = Date.now();
    if (!state.appendingTo) {
      state.currentMeetingId = null;
      state.currentMeeting = null;
    }
    render();
  } catch (e) {
    cleanupRecorder();
    const reason = (e && e.name === 'NotAllowedError') ? '麥克風權限被拒。請到瀏覽器網址列旁邊的鎖頭圖示，把麥克風設成允許。' : (e.message || String(e));
    alert('開始錄音失敗：' + reason);
  }
}

function cleanupRecorder() {
  if (mediaStream) {
    try { mediaStream.getTracks().forEach(t => t.stop()); } catch {}
  }
  mediaStream = null;
  mediaRecorder = null;
}

async function handleStop() {
  if (!state.recording || !mediaRecorder) return;
  const btn = $('#btn-stop');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="dot"></span> 封存中…'; }

  const stopped = new Promise(resolve => {
    mediaRecorder.addEventListener('stop', resolve, { once: true });
  });
  try { mediaRecorder.stop(); } catch {}
  await stopped;

  const blob = new Blob(recordedChunks, { type: mediaRecorder?.mimeType || 'audio/webm' });
  cleanupRecorder();
  state.recording = false;
  state.recordingStartedAt = null;

  const appendingTo = state.appendingTo;
  state.appendingTo = null;
  try {
    const buf = await blob.arrayBuffer();
    const endpoint = appendingTo ? `/api/meetings/${appendingTo}/sources` : '/api/meetings';
    const headers = { 'Content-Type': 'application/octet-stream', 'X-Audio-Ext': recordedExt };
    if (!appendingTo) headers['X-Meeting-Mode'] = state.mode;
    const data = await api(endpoint, { method: 'POST', headers, body: buf });
    await openMeeting(data.meeting);
    await refreshList();
  } catch (e) {
    alert('上傳失敗：' + e.message);
    if (btn) { btn.disabled = false; btn.innerHTML = '<span class="dot"></span> 結束並封存'; }
  }
}

async function handleUpload(file, appendingTo = null) {
  const m = file.name.match(/\.([^.]+)$/);
  const ext = (m ? m[1] : 'm4a').toLowerCase();
  const buf = await file.arrayBuffer();
  try {
    const endpoint = appendingTo ? `/api/meetings/${appendingTo}/sources` : '/api/meetings';
    const headers = { 'Content-Type': 'application/octet-stream', 'X-Audio-Ext': ext };
    if (!appendingTo) headers['X-Meeting-Mode'] = state.mode;
    const data = await api(endpoint, { method: 'POST', headers, body: buf });
    await openMeeting(data.meeting);
    await refreshList();
  } catch (e) {
    alert('上傳失敗：' + e.message);
  }
}

async function handleAppendRecord() {
  if (!state.currentMeetingId) return;
  if (state.currentMeeting?.stage !== 'done') {
    alert('只有已封印的卷宗能續錄');
    return;
  }
  state.appendingTo = state.currentMeetingId;
  await handleStart();
}

function handleAppendUploadClick() {
  if (!state.currentMeetingId) return;
  if (state.currentMeeting?.stage !== 'done') {
    alert('只有已封印的卷宗能追加音檔');
    return;
  }
  const id = state.currentMeetingId;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'audio/*,.m4a,.mp3,.wav,.mov,.mp4,.webm,.ogg,.pdf';
  input.addEventListener('change', () => {
    const f = input.files?.[0];
    if (f) handleUpload(f, id);
  });
  input.click();
}

// ── Source picker (新增來源 / 追加來源 統一入口) ───────────────
function closeAllSourceMenus() {
  document.querySelectorAll('.source-picker.open').forEach(el => el.classList.remove('open'));
}
function wireSourcePicker(buttonId, mode) {
  const btn = document.getElementById(buttonId);
  const wrap = document.getElementById(buttonId + '-wrap');
  if (!btn || !wrap) return;
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const wasOpen = wrap.classList.contains('open');
    closeAllSourceMenus();
    if (!wasOpen) wrap.classList.add('open');
  });
  wrap.querySelectorAll('.source-menu button').forEach(item => {

      closeAllSourceMenus();
      handleSourcePick(kind, mode);

}
function handleSourcePick(kind, mode) {
  if (kind === 'record') {
    if (mode === 'append') handleAppendRecord();

function openSourceModal(kind, mode) {

    if (kind === 'text' && focusEl) {
      const upd = () => { meta.textContent = `${focusEl.value.length.toLocaleString()} 字`; };

      upd();

}
function closeSourceModal() {
  state.sourceModal = null;
  const m = document.getElementById('text-modal');
  if (m) m.classList.remove('active');
}
async function handleSourceSubmit() {
  if (!state.sourceModal) return;
  const { kind, mode } = state.sourceModal;
  const input = document.getElementById('modal-input');
  if (!input) return;
  const value = input.value.trim();
  if (!value) { alert('內容不能為空'); input.focus(); return; }

  const headers = {
    'Content-Type': 'text/plain; charset=utf-8',
    'X-Source-Type': kind,
  };
  if (kind === 'drive') {
    const dt = document.getElementById('modal-drive-type');
    if (dt && dt.value) headers['X-Drive-Type'] = dt.value;
  }
  const endpoint = mode === 'append' && state.currentMeetingId
    ? `/api/meetings/${state.currentMeetingId}/sources`
    : '/api/meetings';
  if (mode !== 'append') headers['X-Meeting-Mode'] = state.mode;
  closeSourceModal();
  try {
    const data = await api(endpoint, { method: 'POST', headers, body: value });
    await openMeeting(data.meeting);
    await refreshList();
  } catch (e) {
    alert('送出失敗：' + e.message);
  }
}

async function handleCancel() {
  const id = state.currentMeetingId;
  if (!id) return;
  if (!confirm('確定要中止這次處理嗎？已建立的 NotebookLM 筆記不會被刪除。')) return;
  const btn = $('#btn-cancel');
  if (btn) { btn.disabled = true; btn.textContent = '中止中…'; }
  try {
    await api(`/api/meetings/${id}/cancel`, { method: 'POST' });
    // 後端會 broadcast cancelled，SSE 會更新；保險起見 refresh 一次
    const m = await api(`/api/meetings/${id}`);
    await openMeeting(m);
    await refreshList();
  } catch (e) {
    alert('中止失敗：' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '中止這次處理'; }
  }
}

async function handleRenameTitle(next, prev, titleEl) {
  const id = state.currentMeetingId;
  if (!id) return;
  titleEl.classList.add('saving');
  try {
    const r = await api(`/api/meetings/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: next })
    });
    if (state.currentMeeting) state.currentMeeting.title = r.meeting.title;
    titleEl.textContent = r.meeting.title;
    await refreshList();
    if (r.warning) alert('已存到本地，但同步 NotebookLM 失敗：\n' + r.warning);
  } catch (e) {
    titleEl.textContent = prev;
    alert('改名失敗：' + e.message);
  } finally {
    titleEl.classList.remove('saving');
  }
}

async function handleSelect(id) {
  try {
    const m = await api(`/api/meetings/${id}`);
    await openMeeting(m);
  } catch (e) {
    alert('讀取失敗：' + e.message);
  }
}

async function handleDismissAppendError() {
  const id = state.currentMeetingId;
  if (!id) return;
  try {
    const r = await api(`/api/meetings/${id}/clear-append-error`, { method: 'POST' });
    if (state.currentMeeting) state.currentMeeting.appendError = undefined;
    if (r.meeting) state.currentMeeting = r.meeting;
    renderStage();
  } catch (e) {
    alert('清除失敗：' + e.message);
  }
}

async function handleDelete() {
  if (!state.currentMeetingId) return;
  if (!confirm('確定解除此卷？此記憶將永遠湮滅（NotebookLM 上的對應筆記也會一併刪除）。')) return;
  try {
    const r = await fetch(`/api/meetings/${state.currentMeetingId}`, { method: 'DELETE' });
    const j = await r.json().catch(() => ({}));
    state.currentMeetingId = null;
    state.currentMeeting = null;
    state.transcriptOpen = false;
    closeStream();
    await refreshList();
    render();
    if (j.warning) alert('本地已刪除，但 NotebookLM 那邊刪除失敗：\n' + j.warning);
  } catch (e) {
    alert('刪除失敗：' + e.message);
  }
}

function handleBackToIdle() {
  state.currentMeetingId = null;
  state.currentMeeting = null;
  state.transcriptOpen = false;
  state.openSources = {};
  state.appendingTo = null;
  state.lastAnimatedMeeting = null;
  closeStream();
  render();
}

async function handleSourceRename(idx) {
  const m = state.currentMeeting;
  const src = m?.sources?.[idx];
  if (!src) return;
  const next = window.prompt(`為第 ${idx + 1} 段命名（或更新名稱）：`, src.title || '');
  if (next == null) return;
  const trimmed = next.trim();
  if (!trimmed) return;
  if (trimmed === (src.title || '')) return;
  try {
    const r = await api(`/api/meetings/${state.currentMeetingId}/sources/${idx}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: trimmed })
    });
    state.currentMeeting = r.meeting;
    renderStage();
    if (r.warning) alert('本地已改名，但同步 NotebookLM 失敗：\n' + r.warning);
  } catch (e) {
    alert('改名失敗：' + e.message);
  }
}

async function handleSourceDelete(idx) {
  const m = state.currentMeeting;
  const src = m?.sources?.[idx];
  if (!src) return;
  const total = m.sources.length;
  const label = src.title || `第 ${idx + 1} 段`;
  const extra = total === 1
    ? '\n\n提醒：這是此卷僅有的來源，刪除後卷宗會留空，可考慮直接「解除此卷」。'
    : '\n\n刪完後記得按「重新摘要」讓月讀之言對齊新內容。';
  if (!confirm(`確定刪除「${label}」？此來源在 NotebookLM 上也會被永久刪除。${extra}`)) return;
  try {
    const r = await api(`/api/meetings/${state.currentMeetingId}/sources/${idx}`, { method: 'DELETE' });
    state.currentMeeting = r.meeting;
    state.openSources = {};
    renderStage();
    if (r.warning) alert('本地已刪除，但 NotebookLM 端刪除失敗：\n' + r.warning);
  } catch (e) {
    alert('刪除失敗：' + e.message);
  }
}

async function handleResummarize() {
  const m = state.currentMeeting;
  if (!m || !state.currentMeetingId) return;
  if (!(m.sources?.length)) { alert('此卷目前沒有任何來源，無法重新摘要。'); return; }
  if (!confirm('重新摘要會依目前所有來源重跑一次 NotebookLM；過程中此卷會回到處理中。確定？')) return;
  try {
    await api(`/api/meetings/${state.currentMeetingId}/resummarize`, { method: 'POST' });
    // 後續 stage 變化由 SSE 推回，render 會自然切到 processing
  } catch (e) {
    alert('重新摘要失敗：' + e.message);
  }
}

async function handleSwitchMode() {
  const m = state.currentMeeting;
  if (!m || !state.currentMeetingId) return;
  if (state.switchingMode) return;
  const current = m.mode === 'class' ? 'class' : 'meeting';
  const next = current === 'class' ? 'meeting' : 'class';
  const nextLabel = next === 'class' ? '課堂卷' : '會議卷';
  if (!confirm(`要把此卷切換成「${nextLabel}」並重新整理摘要嗎？`)) return;
  state.switchingMode = true;
  renderStage();
  try {
    await api(`/api/meetings/${state.currentMeetingId}/resummarize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: next })
    });
    // 後續 stage 變化由 SSE 推回，render 會自然切到 processing
  } catch (e) {
    alert('切換模式失敗：' + e.message);
  } finally {
    state.switchingMode = false;
  }
}

// ── Meeting helpers ────────────────────────────────────────
async function openMeeting(meeting) {
  if (state.currentMeetingId !== meeting.id) {
    state.openSources = {};
  }
  state.currentMeetingId = meeting.id;
  state.currentMeeting = meeting;
  state.transcriptOpen = false;

  // For finished meetings, fetch full content
  if (['done', 'error', 'cancelled'].includes(meeting.stage)) {
    try {
      const full = await api(`/api/meetings/${meeting.id}`);
      state.currentMeeting = full;
    } catch {}
  }

  openStream(meeting.id);
  render();
}

function openStream(id) {
  closeStream();
  currentEventSource = new EventSource(`/stream/${id}`);
  currentEventSource.addEventListener('stage', async (e) => {
    try {
      const d = JSON.parse(e.data);
      if (state.currentMeeting && state.currentMeetingId === id) {
        state.currentMeeting = { ...state.currentMeeting, stage: d.stage, stageMsg: d.msg };
      }
      await refreshList();
      render();
    } catch {}
  });
  currentEventSource.addEventListener('done', async (e) => {
    try {
      const d = JSON.parse(e.data);
      state.currentMeeting = d.meeting;
      await refreshList();
      render();
    } catch {}
  });
  currentEventSource.addEventListener('error', async (e) => {
    try {
      const d = JSON.parse(e.data);
      if (state.currentMeeting && state.currentMeetingId === id) {
        state.currentMeeting = { ...state.currentMeeting, stage: 'error', stageMsg: d.msg };
        render();
      }
    } catch {}
  });
  currentEventSource.addEventListener('cancelled', async (e) => {
    try {
      const d = JSON.parse(e.data);
      if (state.currentMeeting && state.currentMeetingId === id) {
        state.currentMeeting = { ...state.currentMeeting, stage: 'cancelled', stageMsg: d.msg };
        await refreshList();
        render();
      }
    } catch {}
  });
  currentEventSource.addEventListener('append-error', async (e) => {
    try {
      const d = JSON.parse(e.data);
      if (state.currentMeetingId === id) {
        state.currentMeeting = d.meeting || { ...state.currentMeeting, appendError: d.msg, stage: 'done' };
        await refreshList();
        render();
      }
    } catch {}
  });
}
function closeStream() {
  if (currentEventSource) { currentEventSource.close(); currentEventSource = null; }
}

async function refreshList() {
  try {
    const list = await api('/api/meetings');
    state.records = Array.isArray(list) ? list : [];
    renderSidebar();
  } catch (e) {
    console.warn('refresh failed', e);
  }
}

// ── 忍術主題切換 ────────────────────────────────────────────
function playThemeTransition(nextTheme, applyFn) {
  const el = document.getElementById('theme-transition');
  const kanji = document.getElementById('theme-transition-kanji');
  if (!el || !kanji) { applyFn(); return; }
  // 切到夜模式顯示「夜」，切到日模式顯示「日」
  kanji.textContent = nextTheme === 'night' ? '夜' : '日';
  // 重新觸發動畫
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
  // 雙刀交會的瞬間切換主題（veil 完全遮住畫面時）
  setTimeout(applyFn, 420);
  setTimeout(() => el.classList.remove('active'), 900);
}

// ── 重啟結界 ────────────────────────────────────────────────
function showRestartOverlay(status, sub) {
  const el = document.getElementById('restart-overlay');
  const st = document.getElementById('restart-status');
  const sb = document.getElementById('restart-sub');
  if (!el) return;
  el.classList.remove('complete');
  el.classList.add('active');
  if (st && status) st.textContent = status;
  if (sb && sub) sb.textContent = sub;
}
function updateRestartOverlay(status, sub) {
  const st = document.getElementById('restart-status');
  const sb = document.getElementById('restart-sub');
  if (st && status) st.textContent = status;
  if (sb && sub) sb.textContent = sub;
}
function hideRestartOverlay() {
  const el = document.getElementById('restart-overlay');
  if (!el) return;
  el.classList.add('complete');
  setTimeout(() => { el.classList.remove('active', 'complete'); }, 700);
}

// ── Server health / restart ────────────────────────────────
let serverState = 'up';
function setServerState(s) {
  serverState = s;
  const pill = $('#server-pill');
  const label = $('#server-pill-label');
  if (!pill || !label) return;
  pill.dataset.state = s;
  label.textContent = ({ up: '伺服器運行中', down: '伺服器中斷', restarting: '重啟中…' })[s] || s;
}
async function pollHealth() {
  try {
    const r = await fetch('/api/health', { cache: 'no-store' });
    if (!r.ok) throw new Error('bad');
    if (serverState !== 'up') setServerState('up');
  } catch {
    if (serverState !== 'restarting') setServerState('down');
  }
}
async function handleRestartServer() {
  if (serverState === 'restarting') return;
  if (!confirm('確定要重啟 Yomi 伺服器嗎？正在處理中的會議會被中斷。')) return;
  setServerState('restarting');
  showRestartOverlay('重啟結界中', 'CASTING · SEAL · REBIRTH');
  try { await fetch('/api/restart', { method: 'POST', cache: 'no-store' }); } catch {}

  // 三段式狀態：發動 → 等待 → 復活
  const startedAt = Date.now();
  const deadline = startedAt + 30000;
  let phase = 0;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 600));
    const elapsed = Date.now() - startedAt;
    if (elapsed > 1500 && phase < 1) { phase = 1; updateRestartOverlay('月引斷續', 'AWAITING · MOON · PULL'); }
    if (elapsed > 6000 && phase < 2) { phase = 2; updateRestartOverlay('結界凝結', 'WEAVING · SEAL · KNOT'); }
    try {
      const r = await fetch('/api/health', { cache: 'no-store' });
      if (r.ok) {
        updateRestartOverlay('結界已成', 'AWAKENED');
        setServerState('up');
        await new Promise(r => setTimeout(r, 700));
        hideRestartOverlay();
        return;
      }
    } catch {}
  }
  setServerState('down');
  hideRestartOverlay();
  alert('伺服器重啟超過 30 秒沒回來。請在終端機跑 npm start 看看哪裡卡住。');
}

// ── Wire global controls ───────────────────────────────────
function wireGlobal() {
  $('#theme-toggle').addEventListener('click', () => {
    const next = state.theme === 'night' ? 'day' : 'night';
    playThemeTransition(next, () => applyTheme(next));
  });
  $('#server-pill').addEventListener('click', handleRestartServer);

  // Settings dropdown
  const settingsBtn = $('#settings-btn');
  const settingsMenu = $('#settings-menu');
  const closeSettings = () => {
    settingsMenu.classList.remove('open');
    settingsBtn.classList.remove('open');
  };
  const toggleSettings = (e) => {
    e.stopPropagation();
    const isOpen = settingsMenu.classList.toggle('open');
    settingsBtn.classList.toggle('open', isOpen);
  };
  settingsBtn.addEventListener('click', toggleSettings);
  settingsMenu.addEventListener('click', (e) => e.stopPropagation());
  document.addEventListener('click', (e) => {
    if (!settingsMenu.classList.contains('open')) return;
    if (e.target.closest('#settings-menu') || e.target.closest('#settings-btn')) return;
    closeSettings();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSettings();
  });
  $('#new-btn').addEventListener('click', handleBackToIdle);
  $('#search-input').addEventListener('input', (e) => {
    state.searchQuery = e.target.value || '';
    renderSidebar();
  });
  $('#file-input').addEventListener('change', (e) => {
    const f = e.target.files?.[0];
    if (f) handleUpload(f);
    e.target.value = '';
  });

  // Keyboard: Cmd/Ctrl+N for new
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n') {
      e.preventDefault();
      handleBackToIdle();
    }
    if (e.key === 'Escape' && state.recording) {
      // Don't accidentally stop on Esc; just blur focus
      document.activeElement?.blur?.();
    }
  });

  // Global drag/drop fallback (when not on idle dropzone)
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    if (e.target.closest('#dropzone')) return; // handled inside
    e.preventDefault();
    const f = e.dataTransfer?.files?.[0];
    if (f) handleUpload(f);
  });

  // Source modal 全域綁定（這些元素在 <script> 之後才出現，DOMContentLoaded 後才會存在）
  const modalEl = document.getElementById('text-modal');
  const modalClose = document.getElementById('text-modal-close');
  const modalCancel = document.getElementById('text-modal-cancel');
  const modalSubmit = document.getElementById('text-modal-submit');
  if (modalClose) modalClose.addEventListener('click', closeSourceModal);
  if (modalCancel) modalCancel.addEventListener('click', closeSourceModal);
  if (modalSubmit) modalSubmit.addEventListener('click', handleSourceSubmit);
  if (modalEl) modalEl.addEventListener('click', e => { if (e.target === modalEl) closeSourceModal(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.sourceModal) closeSourceModal();
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && state.sourceModal) {
      e.preventDefault(); handleSourceSubmit();
    }
  });

  // 點 picker 外面關 menu
  document.addEventListener('click', e => {
    if (e.target.closest('.source-picker')) return;
    closeAllSourceMenus();
  });
}

// ── Init ───────────────────────────────────────────────────
async function init() {
  applyTheme(state.theme);
  renderMascotPill();
  renderMascotPicker();
  wireGlobal();

  await refreshList();
  render();

  pollHealth();
  setInterval(pollHealth, 4000);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

  </div>

  <!-- 通用來源 modal（文字 / 網址 / YouTube / Drive） -->

        <div class="seal-core">印</div>
      </div>
      <div class="restart-status" id="restart-status">重啟結界中</div>
