<!doctype html>
<html lang="zh-Hant" data-theme="day">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yomi · 月讀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ──────────────────────────────────────────────────────────
       Yomi · cute-professional shinobi aesthetic
       palette tokens are set on :root via data-theme
       ────────────────────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; }

    :root {
      /* default — "washi" daylight palette */
      --ink:        #2a2440;
      --ink-soft:   #6b6480;
      --ink-mute:   #a39db5;
      --paper:      #f5efe1;
      --paper-2:    #ede4d0;
      --paper-3:    #fbf7ec;
      --moon:       #d9a441;
      --moon-soft:  #e8c875;
      --sakura:     #d98aa0;
      --jade:       #6fa48a;
      --seal:       #c14a4a;
      --rule:       rgba(42,36,64,0.12);
      --shadow:     0 1px 0 rgba(255,255,255,.7) inset,
                    0 1px 2px rgba(42,36,64,.08),
                    0 12px 30px -16px rgba(42,36,64,.25);
    }

    :root[data-theme="night"] {
      /* night — "tsukimi" moon-viewing palette */
      --ink:        #f3eada;
      --ink-soft:   #c3bca8;
      --ink-mute:   #7e7a92;
      --paper:      #14132a;
      --paper-2:    #0c0b1d;
      --paper-3:    #1c1b34;
      --moon:       #f0c674;
      --moon-soft:  #ffd687;
      --sakura:     #e89cb3;
      --jade:       #8cc4a5;
      --seal:       #e87a7a;
      --rule:       rgba(243,234,218,0.10);
      --shadow:     0 1px 0 rgba(255,255,255,.05) inset,
                    0 1px 2px rgba(0,0,0,.4),
                    0 12px 30px -10px rgba(0,0,0,.55);
    }

    html, body, #root {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: "Zen Maru Gothic", "Shippori Mincho", ui-sans-serif, system-ui, -apple-system, "PingFang TC", sans-serif;
      font-feature-settings: "palt";
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* paper-grain backdrop */
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(1200px 800px at 80% -10%, color-mix(in oklab, var(--moon) 18%, transparent), transparent 60%),
        radial-gradient(900px 700px at 8% 110%, color-mix(in oklab, var(--sakura) 14%, transparent), transparent 60%),
        repeating-linear-gradient(0deg, transparent 0 3px, color-mix(in oklab, var(--ink) 3%, transparent) 3px 4px);
      background-blend-mode: multiply;
      opacity: .9;
    }

    /* ── App shell ── */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 296px 1fr;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      padding: 22px 18px 18px;
      gap: 18px;
      border-right: 1px solid var(--rule);
      background: linear-gradient(180deg, color-mix(in oklab, var(--paper) 96%, var(--paper-2)) 0%, var(--paper) 80%);
      min-height: 0;
    }

    .brand { display: flex; align-items: center; gap: 12px; padding: 2px 4px; }
    .brand-mark {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--moon-soft), var(--moon) 60%, color-mix(in oklab, var(--moon) 60%, var(--ink)));
      box-shadow: 0 0 0 1px color-mix(in oklab, var(--moon) 60%, transparent),
                  0 6px 16px -8px color-mix(in oklab, var(--moon) 80%, transparent);
      position: relative;
    }
    .brand-mark::after {
      content: ""; position: absolute; inset: 4px 0 4px 6px;
      border-radius: 50%;
      background: radial-gradient(circle at 80% 50%, transparent 38%, color-mix(in oklab, var(--paper) 70%, transparent) 40%);
    }
    .brand-name {
      font-family: "Klee One", "Shippori Mincho", "Noto Serif TC", serif;
      font-size: 22px; font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
    }
    .brand-name .kanji-mark {
      font-family: "Klee One", "Shippori Mincho", serif;
      font-weight: 600;
      font-size: 22px;
      line-height: 1;
      color: var(--moon);
      letter-spacing: 0;
      font-style: normal;
    }
    .brand-sub {
      font-size: 10.5px; letter-spacing: 0.32em;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .new-btn {
      appearance: none; border: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      border-radius: 12px;
      background: var(--ink);
      color: var(--paper);
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer;
      box-shadow: 0 6px 14px -8px color-mix(in oklab, var(--ink) 80%, transparent);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .new-btn:hover { transform: translateY(-1px); }
    .new-btn .plus {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--moon);
      color: var(--ink);
      display: grid; place-items: center;
      font-size: 14px; font-weight: 700; line-height: 1;
    }
    .new-btn .kbd {
      margin-left: auto;
      font-size: 11px;
      opacity: 0.6;
    }

    .search {
      position: relative;
    }
    .search input {
      width: 100%;
      padding: 9px 12px 9px 32px;
      border-radius: 10px;
      border: 1px solid var(--rule);
      background: color-mix(in oklab, var(--paper-3) 80%, transparent);
      color: var(--ink);
      font-family: inherit; font-size: 13px;
      outline: none;
    }
    .search input::placeholder { color: var(--ink-mute); }
    .search input:focus { border-color: color-mix(in oklab, var(--ink) 25%, transparent); }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--ink-mute); pointer-events: none;
      display: grid; place-items: center;
    }

    .section-h {
      display: flex; align-items: center; justify-content: space-between;
      font-family: "Shippori Mincho", "Noto Serif TC", serif;
      font-size: 12px; letter-spacing: 0.28em;
      color: var(--ink-soft);
      text-transform: uppercase;
      padding: 2px 4px;
    }
    .section-h .tag-cn { font-family: "Shippori Mincho", serif; letter-spacing: 0.5em; }

    .records {
      flex: 1; overflow-y: auto; min-height: 0;
      margin: -4px -8px;
      padding: 4px 8px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--rule) transparent;
    }
    .records::-webkit-scrollbar { width: 6px; }
    .records::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

    .record {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      transition: background .12s ease, border-color .12s ease;
    }
    .record:hover { background: color-mix(in oklab, var(--paper-3) 60%, transparent); }
    .record.active {
      background: color-mix(in oklab, var(--paper-3) 70%, transparent);
      border-color: var(--rule);
    }
    .record-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--paper-3);
      border: 1px solid var(--rule);
      display: grid; place-items: center;
      color: var(--ink-soft);
      flex-shrink: 0;
    }
    .record-icon.tag-moon { background: color-mix(in oklab, var(--moon) 18%, var(--paper-3)); color: var(--moon); }
    .record-icon.tag-sakura { background: color-mix(in oklab, var(--sakura) 16%, var(--paper-3)); color: var(--sakura); }
    .record-icon.tag-jade { background: color-mix(in oklab, var(--jade) 16%, var(--paper-3)); color: var(--jade); }
    .record-icon.tag-seal { background: color-mix(in oklab, var(--seal) 14%, var(--paper-3)); color: var(--seal); }
    .record-title {
      font-size: 13.5px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3;
    }
    .record-meta {
      font-size: 11px;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      display: flex; gap: 6px; align-items: center;
      margin-top: 3px;
    }
    .record-dur {
      font-size: 10.5px;
      color: var(--ink-mute);
      font-variant-numeric: tabular-nums;
    }
    .record-empty {
      font-size: 12px;
      color: var(--ink-mute);
      padding: 8px 4px;
      font-style: italic;
    }

    /* Settings dropdown (top-right) — mascot pill */
    .settings-wrap { position: relative; }
    .mascot-pill {
      appearance: none;
      height: 34px;
      padding: 0 12px 0 4px;
      border-radius: 999px;
      border: 1px solid color-mix(in oklab, var(--sakura) 30%, var(--rule));
      background: color-mix(in oklab, var(--sakura) 10%, var(--paper-3));
      color: var(--ink);
      display: flex; align-items: center; gap: 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background .12s ease, border-color .12s ease, transform .12s ease;
    }
    .mascot-pill:hover {
      background: color-mix(in oklab, var(--sakura) 16%, var(--paper-3));
      border-color: color-mix(in oklab, var(--sakura) 50%, var(--rule));
    }
    .mascot-pill.open {
      background: color-mix(in oklab, var(--sakura) 20%, var(--paper-3));
      border-color: var(--sakura);
      box-shadow: 0 0 0 1px color-mix(in oklab, var(--sakura) 35%, transparent);
    }
    .mascot-pill-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--paper);
      display: grid; place-items: center;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 0 0 1px color-mix(in oklab, var(--sakura) 25%, transparent);
    }
    .mascot-pill-avatar svg {
      width: 30px; height: 30px;
      display: block;
      transform: translateY(2px);
    }
    .mascot-pill-name {
      font-family: "Shippori Mincho", "Noto Serif TC", serif;
      letter-spacing: 0.2em;
      font-weight: 500;
    }
    .mascot-pill-chev {
      color: var(--ink-soft);
      transition: transform .2s ease;
    }
    .mascot-pill.open .mascot-pill-chev { transform: rotate(180deg); }

    .settings-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 240px;
      background: var(--paper-3);
      border: 1px solid var(--rule);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
      z-index: 50;
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
      transform-origin: top right;
      pointer-events: none;
      transition: opacity .15s ease, transform .18s ease;
    }
    .settings-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .settings-menu::before {
      content: "";
      position: absolute;
      top: -5px; right: 14px;
      width: 10px; height: 10px;
      background: var(--paper-3);
      border-left: 1px solid var(--rule);
      border-top: 1px solid var(--rule);
      transform: rotate(45deg);
    }
    .settings-section {
      display: flex; flex-direction: column;
      gap: 10px;
    }
    .settings-section + .settings-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
    }
    .settings-label {
      display: flex; align-items: center; justify-content: space-between;
      font-family: "Shippori Mincho", serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--ink-soft);
      text-transform: uppercase;
      padding: 0 2px;
    }
    .settings-label .tag-cn {
      font-family: "Shippori Mincho", serif;
      letter-spacing: 0.5em;
      text-transform: none;
    }
    .mascot-picker-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .mascot-option {
      appearance: none;
      border: 1px solid var(--rule);
      background: color-mix(in oklab, var(--paper-3) 70%, transparent);
      border-radius: 12px;
      padding: 8px 6px 6px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--ink-soft);
      font-family: inherit;
      transition: all .15s ease;
      position: relative;
    }
    .mascot-option:hover {
      background: var(--paper-3);
      border-color: color-mix(in oklab, var(--moon) 30%, var(--rule));
      transform: translateY(-1px);
    }
    .mascot-option.active {
      background: color-mix(in oklab, var(--moon) 14%, var(--paper-3));
      border-color: var(--moon);
      color: var(--ink);
      box-shadow: 0 0 0 1px color-mix(in oklab, var(--moon) 40%, transparent),
                  0 8px 18px -10px color-mix(in oklab, var(--moon) 70%, transparent);
    }
    .mascot-option svg {
      width: 44px; height: 44px;
      display: block;
    }
    .mascot-option .name {
      font-family: "Shippori Mincho", "Noto Serif TC", serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      font-weight: 500;
    }
    .mascot-option.active::after {
      content: "";
      position: absolute;
      top: 6px; right: 6px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--moon);
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--moon) 25%, transparent);
    }

    /* ── Main stage ── */
    .stage {
      position: relative;
      display: flex; flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 26px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .topbar-title {
      display: flex; align-items: center; gap: 14px;
      font-family: "Zen Maru Gothic", "Noto Sans TC", sans-serif;
      font-size: 11px;
      letter-spacing: 0.42em;
      color: var(--ink-mute);
      text-transform: uppercase;
    }
    .topbar-title .kanji {
      font-family: "Klee One", "Shippori Mincho", "Noto Serif TC", serif;
      font-weight: 600;
      font-size: 19px;
      color: var(--ink);
      letter-spacing: 0.16em;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
    }
    .topbar-title .kanji::before {
      content: "";
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--moon);
      transform: translateY(-2px);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--moon) 18%, transparent);
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .theme-pill {
      height: 34px; padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--rule);
      background: var(--paper-3);
      color: var(--ink-soft);
      display: flex; align-items: center; gap: 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background .12s ease;
    }
    .theme-pill:hover { background: color-mix(in oklab, var(--paper-3) 80%, var(--paper-2)); }

    /* server status + restart */
    .server-pill {
      height: 34px; padding: 0 14px 0 10px;
      border-radius: 999px;
      border: 1px solid var(--rule);
      background: var(--paper-3);
      color: var(--ink-soft);
      display: flex; align-items: center; gap: 8px;
      font-family: inherit; font-size: 12px;
      cursor: pointer;
      transition: background .12s ease, border-color .12s ease;
    }
    .server-pill:hover { background: color-mix(in oklab, var(--paper-3) 80%, var(--paper-2)); }
    .server-pill .led {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ink-mute);
      box-shadow: 0 0 0 0 currentColor;
    }
    .server-pill[data-state="up"]   .led { background: var(--jade); box-shadow: 0 0 6px color-mix(in oklab, var(--jade) 70%, transparent); }
    .server-pill[data-state="down"] .led { background: var(--seal); box-shadow: 0 0 6px color-mix(in oklab, var(--seal) 70%, transparent); }
    .server-pill[data-state="restarting"] .led {
      background: var(--moon);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
    .server-pill[data-state="up"]         { border-color: color-mix(in oklab, var(--jade) 30%, var(--rule)); }
    .server-pill[data-state="down"]       { border-color: color-mix(in oklab, var(--seal) 40%, var(--rule)); }
    .server-pill[data-state="restarting"] { border-color: color-mix(in oklab, var(--moon) 40%, var(--rule)); }

    /* ── Stage content ── */
    .stage-body {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 28px 32px 60px;
      gap: 20px;
      overflow-y: auto;
      min-height: 0;
    }
    .stage-body > * { flex-shrink: 0; }
    .stage-body::-webkit-scrollbar { width: 6px; }
    .stage-body::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

    /* ── Idle view：鋪滿視口、禁止滾動，依高度自適應 ── */
    /* 分三組節奏：標題（eyebrow + en）／焦點（mascot + timer）／互動（helper + dropzone + controls） */
    .stage-body.idle {
      overflow: hidden;
      justify-content: center;
      padding: clamp(20px, 4vh, 40px) 32px;
      gap: 0;   /* 用 margin-top 控制節奏，避免 flex gap 把每塊都均勻拉開 */
    }
    /* 標題群 */
    .stage-body.idle .eyebrow      { margin: 0; font-size: clamp(22px, 2.8vh, 28px); }
    .stage-body.idle .eyebrow-en   { margin-top: 6px; }
    /* 焦點群：mascot 與 mascot 下方的 timer 緊貼 */
    .stage-body.idle .mascot-wrap  {
      width:  min(260px, 30vh);
      height: min(260px, 30vh);
      margin-top: clamp(14px, 3vh, 32px);
    }
    .stage-body.idle .mascot       {
      width:  min(160px, 19vh);
      height: min(160px, 19vh);
    }
    .stage-body.idle .timer        {
      font-size: clamp(32px, 4.6vh, 52px);
      margin-top: clamp(2px, 0.6vh, 6px);
    }
    /* 互動群：helper / dropzone / controls 互相靠近，但與焦點群分明 */
    .stage-body.idle .helper       {
      margin-top: clamp(18px, 3.6vh, 32px);
      line-height: 1.85;
      font-size: clamp(13px, 1.7vh, 14px);
    }
    .stage-body.idle .dropzone     {
      margin-top: clamp(10px, 1.8vh, 16px);
      padding: clamp(9px, 1.4vh, 14px) 18px;
    }
    .stage-body.idle .controls     { margin-top: clamp(12px, 2.2vh, 20px); }
    /* 月影之印底飾在待機畫面隱去，避免畫面元素過多顯擠 */
    .stage-body.idle .ornament     { display: none; }

    .eyebrow {
      font-family: "Klee One", "Shippori Mincho", "Noto Serif TC", serif;
      font-weight: 600;
      font-size: 28px;
      color: var(--ink);
      letter-spacing: 0.4em;
      padding-left: 0.4em;
      margin-top: 14px;
      line-height: 1.1;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }
    .eyebrow::before, .eyebrow::after {
      content: "";
      width: 24px; height: 1px;
      background: var(--moon);
      flex-shrink: 0;
    }
    .eyebrow-en {
      font-family: "Zen Maru Gothic", "Noto Sans TC", sans-serif;
      font-size: 10.5px;
      letter-spacing: 0.42em;
      color: var(--ink-mute);
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 500;
    }

    /* mascot stage */
    .mascot-wrap {
      position: relative;
      width: 280px; height: 280px;
      display: grid; place-items: center;
      margin-top: 10px;
    }
    .mascot-halo {
      position: absolute; inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(closest-side, color-mix(in oklab, var(--moon) 22%, transparent), transparent 75%);
      filter: blur(2px);
    }
    .mascot-halo.recording {
      background:
        radial-gradient(closest-side, color-mix(in oklab, var(--seal) 26%, transparent), transparent 70%);
      animation: pulse 1.8s ease-in-out infinite;
    }
    .mascot-halo.processing {
      background:
        radial-gradient(closest-side, color-mix(in oklab, var(--jade) 22%, transparent), transparent 75%);
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .8; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    .mascot-ring {
      position: absolute; inset: 20px;
      border-radius: 50%;
      border: 1px dashed color-mix(in oklab, var(--ink) 18%, transparent);
      animation: spin 60s linear infinite;
    }
    .mascot-ring.fast { animation-duration: 12s; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── 調動忍術靈魂（processing 階段）：浮動 + 查克拉光環 + 軌道能量 + 浮升印字 ── */
    .mascot-wrap.channeling .mascot {
      animation: mascotFloat 2.8s ease-in-out infinite;
      filter: drop-shadow(0 0 8px color-mix(in oklab, var(--jade) 40%, transparent));
    }
    @keyframes mascotFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    .chakra-aura {
      position: absolute;
      inset: 48px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(closest-side,
        color-mix(in oklab, var(--jade) 26%, transparent),
        transparent 75%);
      filter: blur(4px);
      animation: chakraAura 3.2s ease-in-out infinite;
    }
    @keyframes chakraAura {
      0%, 100% { opacity: 0.45; transform: scale(0.95); }
      50%      { opacity: 1;    transform: scale(1.10); }
    }

    .chakra-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .chakra-ring.mid {
      inset: 42px;
      border: 1px dotted color-mix(in oklab, var(--moon) 55%, transparent);
      animation: spin 9s linear infinite;
    }
    .chakra-ring.inner {
      inset: 64px;
      border: 1px dashed color-mix(in oklab, var(--jade) 60%, transparent);
      animation: spin 4.5s linear infinite reverse;
    }

    .chakra-pulse {
      position: absolute;
      left: 50%; top: 50%;
      width: 70px; height: 70px;
      margin: -35px 0 0 -35px;
      border-radius: 50%;
      border: 1.5px solid color-mix(in oklab, var(--jade) 65%, transparent);
      opacity: 0;
      pointer-events: none;
    }
    .chakra-pulse.p1 { animation: chakraPulse 3s ease-out infinite; }
    .chakra-pulse.p2 {
      animation: chakraPulse 3s ease-out 1.5s infinite;
      border-color: color-mix(in oklab, var(--moon) 60%, transparent);
    }
    @keyframes chakraPulse {
      0%   { transform: scale(0.4); opacity: 0; }
      15%  { opacity: 0.85; }
      100% { transform: scale(2.6); opacity: 0; }
    }

    /* 庫洛牌風格的環繞牌陣：8 張卡圍成一圈、整副 deck 緩慢自轉 */
    .card-deck {
      position: absolute;
      inset: 0;
      pointer-events: none;
      animation: spin 22s linear infinite;
    }
    .card-deck.inner {
      animation: spin 14s linear infinite reverse;
    }
    .clow-card {
      position: absolute;
      left: 50%; top: 50%;
      width: 18px; height: 26px;
      margin: -13px 0 0 -9px;
      border-radius: 3px;
      background:
        linear-gradient(135deg,
          color-mix(in oklab, var(--paper-3) 88%, var(--sakura) 12%),
          color-mix(in oklab, var(--paper-3) 82%, var(--moon) 18%));
      border: 1px solid color-mix(in oklab, var(--sakura) 50%, var(--moon) 30%);
      box-shadow:
        0 0 6px color-mix(in oklab, var(--sakura) 55%, transparent),
        0 0 14px color-mix(in oklab, var(--moon) 32%, transparent),
        inset 0 0 4px color-mix(in oklab, var(--sakura) 25%, transparent);
      display: grid; place-items: center;
      font-family: "Shippori Mincho", serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0;
      color: color-mix(in oklab, var(--ink) 75%, var(--sakura) 25%);
      text-shadow: 0 0 4px color-mix(in oklab, var(--sakura) 70%, transparent);
      animation: cardBreathe 3.4s ease-in-out infinite;
    }
    .clow-card::before {
      content: "";
      position: absolute; inset: 2px;
      border-radius: 2px;
      border: 0.5px solid color-mix(in oklab, var(--moon) 45%, transparent);
      pointer-events: none;
    }
    @keyframes cardBreathe {
      0%, 100% { opacity: 0.78; }
      50%      { opacity: 1; }
    }
    /* 外圈 8 張卡平均散布；translateY 是徑向外推、用 rotate 排出角度 */
    .card-deck > .clow-card:nth-child(1) { transform: rotate(0deg)   translateY(-118px); animation-delay: 0s;    }
    .card-deck > .clow-card:nth-child(2) { transform: rotate(45deg)  translateY(-118px); animation-delay: -0.4s; }
    .card-deck > .clow-card:nth-child(3) { transform: rotate(90deg)  translateY(-118px); animation-delay: -0.8s; }
    .card-deck > .clow-card:nth-child(4) { transform: rotate(135deg) translateY(-118px); animation-delay: -1.2s; }
    .card-deck > .clow-card:nth-child(5) { transform: rotate(180deg) translateY(-118px); animation-delay: -1.6s; }
    .card-deck > .clow-card:nth-child(6) { transform: rotate(225deg) translateY(-118px); animation-delay: -2.0s; }
    .card-deck > .clow-card:nth-child(7) { transform: rotate(270deg) translateY(-118px); animation-delay: -2.4s; }
    .card-deck > .clow-card:nth-child(8) { transform: rotate(315deg) translateY(-118px); animation-delay: -2.8s; }

    /* 內圈 4 張較小、較淡的卡 */
    .card-deck.inner > .clow-card {
      width: 13px; height: 19px;
      margin: -9.5px 0 0 -6.5px;
      font-size: 8px;
      opacity: 0.75;
      box-shadow:
        0 0 4px color-mix(in oklab, var(--moon) 55%, transparent),
        0 0 10px color-mix(in oklab, var(--sakura) 28%, transparent);
    }
    .card-deck.inner > .clow-card:nth-child(1) { transform: rotate(22deg)  translateY(-72px); animation-delay: -0.6s; }
    .card-deck.inner > .clow-card:nth-child(2) { transform: rotate(112deg) translateY(-72px); animation-delay: -1.4s; }
    .card-deck.inner > .clow-card:nth-child(3) { transform: rotate(202deg) translateY(-72px); animation-delay: -2.2s; }
    .card-deck.inner > .clow-card:nth-child(4) { transform: rotate(292deg) translateY(-72px); animation-delay: -3.0s; }

    .kanji-rise {
      position: absolute;
      left: 50%; top: 50%;
      font-family: "Shippori Mincho", serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--jade);
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 0 12px color-mix(in oklab, var(--jade) 60%, transparent);
      will-change: transform, opacity;
    }
    @keyframes kanjiRise {
      0%   { opacity: 0;    transform: translate(-50%, 30px)   scale(0.55); }
      18%  { opacity: 0.92; transform: translate(-50%, -20px)  scale(1.05); }
      100% { opacity: 0;    transform: translate(-50%, -140px) scale(1.2); }
    }
    .kanji-rise.k1 { animation: kanjiRise 5s ease-out 0s infinite; }
    .kanji-rise.k2 {
      animation: kanjiRise 5s ease-out 1.7s infinite;
      color: var(--moon);
      text-shadow: 0 0 12px color-mix(in oklab, var(--moon) 60%, transparent);
    }
    .kanji-rise.k3 {
      animation: kanjiRise 5s ease-out 3.3s infinite;
      color: var(--sakura);
      text-shadow: 0 0 12px color-mix(in oklab, var(--sakura) 60%, transparent);
    }

    @media (prefers-reduced-motion: reduce) {
      .mascot-wrap.channeling .mascot,
      .chakra-aura, .chakra-ring, .chakra-pulse, .card-deck, .clow-card, .kanji-rise {
        animation: none !important;
      }
      .chakra-pulse, .kanji-rise { opacity: 0 !important; }
      .mascot-wrap.channeling .mascot { transform: none !important; filter: none !important; }
    }

    .mascot {
      position: relative;
      width: 168px; height: 168px;
      display: grid; place-items: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.18s ease;
    }
    .mascot:hover { transform: translateY(-2px); }
    .mascot:active { transform: scale(0.97); }

    .timer {
      font-family: "Shippori Mincho", serif;
      font-variant-numeric: tabular-nums;
      font-size: 56px;
      letter-spacing: 0.18em;
      color: var(--ink);
      margin-top: 2px;
      display: flex; align-items: center; gap: 14px;
    }
    .timer .tick {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--seal);
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .helper {
      text-align: center;
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.9;
      max-width: 480px;
      margin-top: 4px;
    }
    .helper .strong { color: var(--ink); font-weight: 500; }
    .helper a {
      color: var(--moon);
      text-decoration: none;
      border-bottom: 1px dashed color-mix(in oklab, var(--moon) 60%, transparent);
      padding-bottom: 1px;
      cursor: pointer;
    }
    .helper a:hover { color: color-mix(in oklab, var(--moon) 70%, var(--ink)); }

    .controls {
      display: flex; align-items: center; gap: 14px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .control-btn {
      appearance: none;
      height: 44px;
      padding: 0 22px;
      border-radius: 22px;
      border: 1px solid var(--rule);
      background: var(--paper-3);
      color: var(--ink);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background .12s ease, transform .12s ease;
    }
    .control-btn:hover:not(:disabled) { transform: translateY(-1px); background: var(--paper-2); }
    .control-btn:disabled { opacity: 0.55; cursor: wait; }
    .control-btn.primary {
      background: var(--ink);
      color: var(--paper);
      border-color: transparent;
    }
    .control-btn.danger {
      background: color-mix(in oklab, var(--seal) 92%, var(--ink));
      color: var(--paper);
      border-color: transparent;
    }
    .control-btn.ghost {
      background: transparent;
      color: var(--ink-soft);
    }
    .control-btn .dot {
      width: 10px; height: 10px;
      border-radius: 2px;
      background: currentColor;
    }

    /* idle 卷宗模式切換（會議卷 / 課堂卷） */
    .mode-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      margin-top: 4px;
      margin-bottom: 8px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      background: color-mix(in oklab, var(--paper-3) 60%, transparent);
    }
    .mode-opt {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--ink-mute);
      font-family: "Shippori Mincho", serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      border-radius: 999px;
      cursor: pointer;
      transition: background .15s ease, color .15s ease;
    }
    .mode-opt:hover { color: var(--ink-soft); }
    .mode-opt.active {
      background: color-mix(in oklab, var(--moon) 20%, var(--paper));
      color: var(--ink);
    }
    .mode-glyph {
      width: 18px; height: 18px;
      display: inline-grid; place-items: center;
      border-radius: 4px;
      border: 1px solid color-mix(in oklab, currentColor 35%, var(--rule));
      font-size: 11px;
      font-weight: 600;
    }
    .mode-opt.active .mode-glyph {
      background: color-mix(in oklab, var(--moon) 35%, transparent);
      border-color: color-mix(in oklab, var(--moon) 60%, var(--rule));
    }

    /* 摘要頁右上模式切換 chip */
    .mode-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px 3px 4px;
      border: 1px solid var(--rule);
      background: color-mix(in oklab, var(--paper-3) 60%, transparent);
      color: var(--ink-soft);
      border-radius: 999px;
      font-family: "Shippori Mincho", serif;
      font-size: 11.5px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color .12s ease, border-color .12s ease, background .12s ease;
    }
    .mode-chip:hover {
      color: var(--ink);
      border-color: color-mix(in oklab, var(--moon) 50%, var(--rule));
      background: color-mix(in oklab, var(--moon) 8%, var(--paper-3));
    }
    .mode-chip:disabled { opacity: 0.55; cursor: wait; }
    .mode-chip-glyph {
      width: 18px; height: 18px;
      display: inline-grid; place-items: center;
      border-radius: 4px;
      border: 1px solid color-mix(in oklab, var(--moon) 40%, var(--rule));
      background: color-mix(in oklab, var(--moon) 18%, transparent);
      color: var(--ink);
      font-size: 11px;
      font-weight: 600;
    }

    /* file drop hint */
    .dropzone {
      width: min(560px, 100%);
      padding: 14px 18px;
      border: 1px dashed var(--rule);
      border-radius: 14px;
      background: color-mix(in oklab, var(--paper-3) 50%, transparent);
      text-align: center;
      color: var(--ink-soft);
      font-size: 13px;
      margin-top: 6px;
      transition: background .15s ease, border-color .15s ease;
    }
    .dropzone.dragover {
      background: color-mix(in oklab, var(--moon) 12%, var(--paper-3));
      border-color: var(--moon);
      color: var(--ink);
    }
    .dropzone .formats {
      display: inline-flex; gap: 6px; flex-wrap: wrap;
      margin-left: 6px;
    }
    .dropzone .fmt {
      font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
      font-size: 10.5px;
      padding: 2px 6px;
      border-radius: 4px;
      background: color-mix(in oklab, var(--ink) 6%, transparent);
      color: var(--ink-soft);
    }

    /* waveform */
    .waveform {
      display: flex; align-items: center; gap: 3px;
      height: 64px;
      margin-top: 4px;
    }
    .waveform .bar {
      width: 4px;
      background: var(--moon);
      border-radius: 2px;
      transform-origin: center;
      transition: height .12s ease;
      min-height: 6px;
    }

    /* ── Summary scroll card ── */
    .scroll-card {
      width: min(780px, 100%);
      background: var(--paper-3);
      border: 1px solid var(--rule);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 32px 36px 36px;
      position: relative;
      /* 不可加 overflow: hidden，否則「追加來源」彈出選單會被卡片裁切 */
    }
    .scroll-card::before, .scroll-card::after {
      content: "";
      position: absolute;
      left: 22px; right: 22px;
      height: 4px;
      background: linear-gradient(90deg, transparent, color-mix(in oklab, var(--ink) 14%, transparent), transparent);
      pointer-events: none;
    }
    .scroll-card::before { top: 0; }
    .scroll-card::after { bottom: 0; }

    .scroll-hd {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--rule);
    }
    .scroll-title {
      font-family: "Shippori Mincho", serif;
      font-size: 26px;
      line-height: 1.3;
      letter-spacing: 0.02em;
      color: var(--ink);
    }
    .scroll-title[contenteditable="true"] {
      outline: none;
      cursor: text;
      border-radius: 6px;
      padding: 2px 6px;
      margin: -2px -6px;
      transition: background .15s ease, box-shadow .15s ease;
    }
    .scroll-title[contenteditable="true"]:hover {
      background: color-mix(in oklab, var(--moon) 8%, transparent);
    }
    .scroll-title[contenteditable="true"]:focus {
      background: color-mix(in oklab, var(--moon) 12%, transparent);
      box-shadow: inset 0 -2px 0 var(--moon);
    }
    .scroll-title.saving { opacity: 0.5; pointer-events: none; }
    .scroll-meta {
      display: flex; gap: 14px; margin-top: 8px;
      font-size: 12px; color: var(--ink-soft);
      flex-wrap: wrap;
    }
    .scroll-meta .dot { color: var(--ink-mute); }

    .seal {
      flex-shrink: 0;
      width: 64px; height: 64px;
      border: 2px solid var(--seal);
      border-radius: 8px;
      display: grid; place-items: center;
      font-family: "Shippori Mincho", serif;
      color: var(--seal);
      font-size: 14px;
      line-height: 1;
      letter-spacing: 0;
      transform: rotate(-6deg);
      position: relative;
      background: color-mix(in oklab, var(--paper-3) 85%, var(--seal) 4%);
    }
    /* 印章下移，避開右上 scroll-actions 的 icon 按鈕（NotebookLM / 重新摘要 / 解除） */
    .scroll-hd .seal { margin-top: 26px; }
    .seal .stack { display: flex; flex-direction: column; align-items: center; gap: 1px; }

    /* ── 摘要頁靈動 enter 動畫（每卷第一次進入時播放一次） ──────────────── */
    @keyframes yomiFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes yomiSealStamp {
      0%   { opacity: 0; transform: rotate(-32deg) scale(0.55); }
      55%  { opacity: 1; transform: rotate(-4deg)  scale(1.10); }
      75%  { opacity: 1; transform: rotate(-7deg)  scale(0.98); }
      100% { opacity: 1; transform: rotate(-6deg)  scale(1); }
    }
    @keyframes yomiSealBreathe {
      0%, 100% { transform: rotate(-6deg) scale(1); }
      50%      { transform: rotate(-5deg) scale(1.018); }
    }
    @keyframes yomiLineExtend {
      from { width: 0; opacity: 0; }
      to   { width: 14px; opacity: 1; }
    }
    @keyframes yomiCharDrop {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes yomiTitleSweep {
      0%   { background-position: -120% 0; }
      100% { background-position: 220% 0; }
    }
    @keyframes yomiMoteDrift {
      0%   { transform: translate(0, 0) scale(0.8); opacity: 0; }
      15%  { opacity: 0.55; }
      85%  { opacity: 0.4; }
      100% { transform: translate(28px, -34px) scale(1.05); opacity: 0; }
    }

    .scroll-card.enter { animation: yomiFadeUp 0.55s cubic-bezier(.2,.7,.2,1) both; }
    .scroll-card.enter .scroll-hd .seal {
      animation:
        yomiSealStamp 0.7s cubic-bezier(.4,1.6,.5,1) 0.18s both,
        yomiSealBreathe 5.5s ease-in-out 1.4s infinite;
    }
    .scroll-card.enter .scroll-section h4::before {
      animation: yomiLineExtend 0.5s ease-out 0.35s both;
    }
    .scroll-card.enter .scroll-section:nth-of-type(2) h4::before { animation-delay: 0.45s; }
    .scroll-card.enter .scroll-section:nth-of-type(3) h4::before { animation-delay: 0.55s; }

    .scroll-card.enter .chips .chip,
    .scroll-card.enter .chips .chip.link {
      opacity: 0;
      animation: yomiFadeUp 0.4s cubic-bezier(.2,.7,.2,1) both;
    }
    .scroll-card.enter .chips > *:nth-child(1) { animation-delay: 0.20s; }
    .scroll-card.enter .chips > *:nth-child(2) { animation-delay: 0.28s; }
    .scroll-card.enter .chips > *:nth-child(3) { animation-delay: 0.36s; }
    .scroll-card.enter .chips > *:nth-child(4) { animation-delay: 0.44s; }

    .scroll-card.enter .seal .stack > span {
      display: inline-block;
      animation: yomiCharDrop 0.32s ease-out both;
    }
    .scroll-card.enter .seal .stack > span:nth-child(1) { animation-delay: 0.55s; }
    .scroll-card.enter .seal .stack > span:nth-child(2) { animation-delay: 0.64s; }
    .scroll-card.enter .seal .stack > span:nth-child(3) { animation-delay: 0.73s; }

    /* 標題一筆掠過的微微高光（只在 enter 時播一次） */
    .scroll-card.enter .scroll-title {
      background-image: linear-gradient(
        100deg,
        transparent 0%,
        transparent 38%,
        color-mix(in oklab, var(--moon) 35%, transparent) 50%,
        transparent 62%,
        transparent 100%
      );
      background-size: 220% 100%;
      background-repeat: no-repeat;
      -webkit-background-clip: text;
      background-clip: text;
      animation: yomiTitleSweep 1.4s cubic-bezier(.4,.1,.3,1) 0.5s 1;
    }

    /* 持續飄逸的小墨點，營造靈動氛圍。每隔幾秒從卷軸右下角浮起一粒。 */
    .scroll-card .mote {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: color-mix(in oklab, var(--moon) 55%, transparent);
      box-shadow: 0 0 8px color-mix(in oklab, var(--moon) 35%, transparent);
      pointer-events: none;
      opacity: 0;
    }
    .scroll-card .mote.m1 { right: 60px;  bottom: 80px;  animation: yomiMoteDrift 6.5s ease-in-out 0.4s infinite; }
    .scroll-card .mote.m2 { right: 110px; bottom: 130px; animation: yomiMoteDrift 7.5s ease-in-out 2.2s infinite; background: color-mix(in oklab, var(--jade) 50%, transparent); box-shadow: 0 0 8px color-mix(in oklab, var(--jade) 30%, transparent); }
    .scroll-card .mote.m3 { right: 80px;  bottom: 200px; animation: yomiMoteDrift 8.5s ease-in-out 4.0s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .scroll-card,
      .scroll-card.enter,
      .scroll-card.enter .seal,
      .scroll-card.enter .scroll-section h4::before,
      .scroll-card.enter .chips > *,
      .scroll-card.enter .seal .stack > span,
      .scroll-card.enter .scroll-title,
      .scroll-card .mote { animation: none !important; opacity: 1 !important; transform: none !important; }
    }

    .scroll-section { padding-top: 18px; }
    .scroll-section + .scroll-section { margin-top: 6px; }
    .scroll-section h4 {
      margin: 0 0 10px;
      font-family: "Shippori Mincho", serif;
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--ink-soft);
      font-weight: 500;
      display: flex; align-items: center; gap: 10px;
    }
    .scroll-section h4::before {
      content: ""; width: 14px; height: 1px; background: var(--ink-soft);
    }
    .scroll-section p, .scroll-section .body-text {
      margin: 0;
      line-height: 1.85;
      font-size: 14.5px;
      color: var(--ink);
      text-wrap: pretty;
      white-space: pre-wrap;
    }
    .scroll-section .body-text {
      font-family: "Shippori Mincho", "Noto Serif TC", serif;
    }

    /* markdown rendered inside summary */
    .scroll-section .md { white-space: normal; }
    .scroll-section .md > * + * { margin-top: 10px; }
    .scroll-section .md h2 {
      margin: 18px 0 6px;
      font-family: "Shippori Mincho", "Noto Serif TC", serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.12em;
      padding-left: 10px;
      border-left: 3px solid var(--moon);
      line-height: 1.4;
    }
    .scroll-section .md h2:first-child { margin-top: 0; }
    .scroll-section .md p { margin: 0; }
    .scroll-section .md ul, .scroll-section .md ol {
      margin: 0; padding-left: 1.4em;
    }
    .scroll-section .md li { margin: 4px 0; }
    .scroll-section .md ul li::marker { color: var(--moon); }
    .scroll-section .md ol li::marker { color: var(--jade); font-weight: 600; }
    .scroll-section .md table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: color-mix(in oklab, var(--moon) 5%, transparent);
      border-radius: 8px;
      overflow: hidden;
    }
    .scroll-section .md table th,
    .scroll-section .md table td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--rule);
      vertical-align: top;
    }
    .scroll-section .md table th {
      font-weight: 600;
      color: var(--ink-soft);
      background: color-mix(in oklab, var(--moon) 10%, transparent);
      letter-spacing: 0.06em;
    }
    .scroll-section .md table tr:last-child td { border-bottom: none; }

    /* delete subtle button */
    .scroll-card .scroll-actions {
      position: absolute;
      top: 18px; right: 22px;
      display: flex; gap: 6px;
    }
    .scroll-card .icon-ghost {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink-mute);
      display: grid; place-items: center;
      cursor: pointer;
      transition: color .12s ease, background .12s ease, border-color .12s ease;
    }
    .scroll-card .icon-ghost:hover { color: var(--seal); border-color: var(--seal); background: color-mix(in oklab, var(--seal) 6%, transparent); }

    .transcript-link {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--moon);
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px dashed color-mix(in oklab, var(--moon) 50%, transparent);
      padding-bottom: 1px;
      width: max-content;
    }
    .transcript-link .chev { transition: transform .2s ease; }
    .transcript-link.open .chev { transform: rotate(180deg); }
    .transcript-body {
      margin-top: 14px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .transcript-body.open { max-height: 600px; overflow-y: auto; }
    .transcript-body .body-text {
      padding: 12px 14px;
      border-radius: 10px;
      background: color-mix(in oklab, var(--ink) 4%, transparent);
      font-size: 13.5px;
      line-height: 1.85;
      color: var(--ink);
    }

    /* sources accordion (多段音源) */
    .sources-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .source-item {
      border: 1px solid var(--rule);
      border-radius: 12px;
      background: color-mix(in oklab, var(--paper-3) 70%, transparent);
      overflow: hidden;
      transition: border-color .15s ease, background .15s ease;
    }
    .source-item:hover { border-color: color-mix(in oklab, var(--moon) 40%, var(--rule)); }
    .source-hd {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink-soft);
      user-select: none;
    }
    .source-hd .source-num {
      font-family: "Shippori Mincho", serif;
      letter-spacing: 0.16em;
      color: var(--ink);
      font-weight: 600;
    }
    .source-hd .source-meta { font-size: 12px; color: var(--ink-mute); }
    .source-hd .source-title {
      font-family: "Shippori Mincho", serif;
      color: var(--ink);
      font-size: 13px;
      max-width: 280px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .source-hd .source-spacer { flex: 1; }
    .source-hd .source-actions { display: inline-flex; gap: 4px; }
    .source-hd .source-action-btn {
      width: 26px; height: 26px;
      padding: 0;
      border-radius: 7px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink-mute);
      display: grid; place-items: center;
      cursor: pointer;
      transition: color .12s ease, background .12s ease, border-color .12s ease;
    }
    .source-hd .source-action-btn:hover { color: var(--seal); border-color: var(--seal); background: color-mix(in oklab, var(--seal) 6%, transparent); }
    .source-hd .source-action-btn[data-action="rename"]:hover { color: var(--moon); border-color: var(--moon); background: color-mix(in oklab, var(--moon) 8%, transparent); }
    .source-hd .chev { transition: transform .2s ease; color: var(--ink-mute); }
    .source-item.open .chev { transform: rotate(180deg); }
    .source-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .source-item.open .source-body { max-height: 480px; overflow-y: auto; }
    .source-body .body-text {
      margin: 0 14px 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: color-mix(in oklab, var(--ink) 4%, transparent);
      font-size: 13.5px;
      line-height: 1.85;
      color: var(--ink);
      white-space: pre-wrap;
    }
    .append-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--rule);
    }
    .append-bar .control-btn { font-size: 12.5px; padding: 6px 12px; }
    .append-bar .hint {
      flex: 1; min-width: 0;
      font-size: 12px; color: var(--ink-mute);
      align-self: center;
    }
    /* 續錄失敗警告 */
    .append-error {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid color-mix(in oklab, var(--seal) 35%, var(--rule));
      background: color-mix(in oklab, var(--seal) 8%, var(--paper-3));
      color: var(--ink);
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px;
      line-height: 1.7;
    }
    .append-error .seal-icon {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--seal);
      color: var(--paper);
      display: grid; place-items: center;
      font-size: 13px;
      font-family: "Shippori Mincho", serif;
      margin-top: 1px;
    }
    .append-error .msg { flex: 1; white-space: pre-wrap; word-break: break-word; }
    .append-error .dismiss {
      flex-shrink: 0;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink-mute);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: color .12s ease, border-color .12s ease;
    }
    .append-error .dismiss:hover { color: var(--ink); border-color: var(--ink-soft); }
    .source-kind-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.1em;
      background: color-mix(in oklab, var(--jade) 15%, transparent);
      color: color-mix(in oklab, var(--jade) 90%, var(--ink));
      border: 1px solid color-mix(in oklab, var(--jade) 30%, var(--rule));
    }
    .source-kind-chip.audio {
      background: color-mix(in oklab, var(--moon) 15%, transparent);
      color: color-mix(in oklab, var(--moon) 80%, var(--ink));
      border-color: color-mix(in oklab, var(--moon) 30%, var(--rule));
    }

    /* 文字稿 modal */
    .text-modal {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      z-index: 9000;
      background: color-mix(in oklab, var(--paper-2) 70%, transparent);
      backdrop-filter: blur(6px);
    }
    .text-modal.active { display: flex; animation: tmFade .2s ease; }
    @keyframes tmFade { from { opacity: 0 } to { opacity: 1 } }
    .text-modal-card {
      width: min(640px, 92vw);
      max-height: 80vh;
      background: var(--paper-3);
      border: 1px solid var(--rule);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .text-modal-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--rule);
      font-family: "Shippori Mincho", serif;
      font-size: 14px;
      letter-spacing: 0.2em;
      color: var(--ink);
    }
    .text-modal-hd .icon-ghost {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink-mute);
      cursor: pointer;
      display: grid; place-items: center;
      font-size: 14px;
    }
    .text-modal-hd .icon-ghost:hover { color: var(--seal); border-color: var(--seal); }
    .text-modal-body {
      display: flex; flex-direction: column;
      flex: 1;
      min-height: 80px;
      background: var(--paper);
    }
    .text-modal-body textarea {
      flex: 1;
      min-height: 280px;
      resize: vertical;
      padding: 16px 18px;
      border: 0;
      outline: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Zen Maru Gothic", "Shippori Mincho", serif;
      font-size: 14px;
      line-height: 1.85;
      letter-spacing: 0.02em;
    }
    .text-modal-body .modal-line-input {
      margin: 16px 18px;
      padding: 12px 14px;
      background: color-mix(in oklab, var(--ink) 4%, transparent);
      border: 1px solid var(--rule);
      border-radius: 10px;
      outline: 0;
      color: var(--ink);
      font-family: inherit;
      font-size: 14px;
    }
    .text-modal-body .modal-line-input:focus { border-color: var(--moon); }
    .text-modal-body .modal-line-input + .modal-line-input { margin-top: 0; }
    .text-modal-body select.modal-line-input { cursor: pointer; }
    .text-modal-body .modal-label {
      margin: 14px 18px 0;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--ink-soft);
    }
    .text-modal-meta {
      padding: 8px 18px;
      font-size: 12px;
      color: var(--ink-mute);
      border-top: 1px solid var(--rule);
      background: var(--paper-3);
    }
    .text-modal-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 12px 18px;
      background: var(--paper-3);
    }

    /* 新增來源 picker */
    .source-picker { position: relative; display: inline-flex; }
    .source-menu {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      min-width: 220px;
      padding: 6px;
      background: var(--paper-3);
      border: 1px solid var(--rule);
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: none;
      flex-direction: column;
      gap: 2px;
      z-index: 50;
    }
    .source-picker.open .source-menu { display: flex; }
    .source-menu button {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-family: inherit;
      font-size: 13.5px;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s ease;
    }
    .source-menu button:hover { background: color-mix(in oklab, var(--moon) 14%, transparent); }
    .source-menu button .glyph {
      width: 22px; height: 22px;
      display: grid; place-items: center;
      font-family: "Shippori Mincho", serif;
      font-size: 14px;
      color: var(--moon);
    }
    .source-menu .sep {
      height: 1px;
      background: var(--rule);
      margin: 4px 6px;
    }
    .source-menu .hint-row {
      padding: 6px 12px 2px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--ink-mute);
    }

    /* processing scroll */
    .processing-card {
      width: min(560px, 100%);
      padding: 22px 26px;
      border-radius: 16px;
      background: var(--paper-3);
      border: 1px solid var(--rule);
      box-shadow: var(--shadow);
      margin-top: 8px;
    }
    .steps { display: flex; flex-direction: column; gap: 10px; }
    .step {
      display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 12px;
      font-size: 13.5px;
    }
    .step .num {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid var(--rule);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      display: grid; place-items: center;
      color: var(--ink-soft);
      background: var(--paper-3);
    }
    .step.done .num { background: var(--jade); border-color: var(--jade); color: var(--paper); }
    .step.active .num { background: var(--moon); border-color: var(--moon); color: var(--ink); }
    .step.todo { color: var(--ink-mute); }
    .step .spinner {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid color-mix(in oklab, var(--moon) 25%, transparent);
      border-top-color: var(--moon);
      animation: spin 0.9s linear infinite;
    }
    .step .check {
      font-size: 11px; color: var(--ink-mute);
    }
    .step.error .num { background: var(--seal); border-color: var(--seal); color: var(--paper); }

    /* Tags chips */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--rule);
      background: color-mix(in oklab, var(--paper-3) 70%, transparent);
      font-size: 11.5px;
      color: var(--ink-soft);
    }
    .chip.tag-moon { color: color-mix(in oklab, var(--moon) 80%, var(--ink)); background: color-mix(in oklab, var(--moon) 12%, var(--paper-3)); border-color: color-mix(in oklab, var(--moon) 30%, var(--rule)); }
    .chip.tag-jade { color: color-mix(in oklab, var(--jade) 80%, var(--ink)); background: color-mix(in oklab, var(--jade) 12%, var(--paper-3)); border-color: color-mix(in oklab, var(--jade) 30%, var(--rule)); }
    .chip.tag-seal { color: color-mix(in oklab, var(--seal) 90%, var(--ink)); background: color-mix(in oklab, var(--seal) 10%, var(--paper-3)); border-color: color-mix(in oklab, var(--seal) 30%, var(--rule)); }
    a.chip.link {
      display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: color .12s ease, background .12s ease, border-color .12s ease;
    }
    a.chip.link:hover {
      color: color-mix(in oklab, var(--moon) 90%, var(--ink));
      background: color-mix(in oklab, var(--moon) 18%, var(--paper-3));
      border-color: color-mix(in oklab, var(--moon) 45%, var(--rule));
    }
    a.chip.link .arr { font-size: 10px; opacity: .8; }

    /* footer ornament */
    .ornament {
      display: flex; align-items: center; gap: 12px;
      color: var(--ink-mute);
      font-family: "Shippori Mincho", serif;
      font-size: 11px;
      letter-spacing: 0.4em;
      margin-top: 18px;
    }
    .ornament .line { width: 30px; height: 1px; background: var(--ink-mute); }

    /* loading transcript snippet */
    .snippet {
      font-family: "Shippori Mincho", serif;
      font-size: 13px;
      color: var(--ink-mute);
      font-style: italic;
      line-height: 1.7;
      text-align: center;
      max-width: 460px;
      margin-top: 10px;
      min-height: 1.7em;
      transition: opacity .25s ease;
    }

    /* responsive */
    /* ═══════════════════════════════════════════════════════════
       忍術切換：主題切換時的雙重斬擊 + 月印閃光
       ═══════════════════════════════════════════════════════════ */
    .theme-transition {
      position: fixed; inset: 0;
      z-index: 9999;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }
    .theme-transition.active { display: block; }
    .theme-transition .blade {
      position: absolute;
      left: 50%; top: 50%;
      width: 220vmax; height: 22vmin;
      background: linear-gradient(90deg,
        transparent 0%,
        color-mix(in oklab, var(--ink) 40%, transparent) 25%,
        var(--ink) 50%,
        color-mix(in oklab, var(--ink) 40%, transparent) 75%,
        transparent 100%);
      filter: blur(1.5px);
      transform-origin: center;
      opacity: 0.95;
    }
    .theme-transition .blade.b1 {
      transform: translate(-50%, -50%) rotate(-22deg) translateX(-180vmax);
      animation: blade-slash-1 0.85s cubic-bezier(.6,.04,.32,.99) forwards;
    }
    .theme-transition .blade.b2 {
      transform: translate(-50%, -50%) rotate(22deg) translateX(180vmax);
      animation: blade-slash-2 0.85s cubic-bezier(.6,.04,.32,.99) 0.08s forwards;
    }
    @keyframes blade-slash-1 {
      0%   { transform: translate(-50%, -50%) rotate(-22deg) translateX(-180vmax); opacity: 0; }
      18%  { opacity: 1; }
      82%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(-22deg) translateX(180vmax); opacity: 0; }
    }
    @keyframes blade-slash-2 {
      0%   { transform: translate(-50%, -50%) rotate(22deg) translateX(180vmax); opacity: 0; }
      18%  { opacity: 1; }
      82%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(22deg) translateX(-180vmax); opacity: 0; }
    }
    .theme-transition .shuriken {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .theme-transition .shuriken span {
      font-family: "Shippori Mincho", "Noto Serif TC", serif;
      font-size: clamp(120px, 22vmin, 260px);
      font-weight: 600;
      color: var(--moon);
      text-shadow:
        0 0 24px color-mix(in oklab, var(--moon) 70%, transparent),
        0 0 60px color-mix(in oklab, var(--moon) 40%, transparent);
      opacity: 0;
      transform: scale(0.4) rotate(-180deg);
      animation: kanji-flash 0.85s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes kanji-flash {
      0%   { opacity: 0; transform: scale(0.4) rotate(-180deg); }
      45%  { opacity: 1; transform: scale(1.05) rotate(0deg); }
      55%  { opacity: 1; transform: scale(1.05) rotate(0deg); }
      100% { opacity: 0; transform: scale(1.6) rotate(45deg); }
    }
    /* 全螢幕的紙幕翻轉，遮住瞬間的主題切換 */
    .theme-transition .veil {
      position: absolute; inset: 0;
      background: var(--paper);
      clip-path: polygon(-10% 0, -10% 0, -10% 100%, -10% 100%);
      animation: veil-wipe 0.85s cubic-bezier(.7,0,.3,1) forwards;
    }
    @keyframes veil-wipe {
      0%   { clip-path: polygon(-10% 0, -10% 0, -10% 100%, -10% 100%); }
      45%  { clip-path: polygon(-10% 0, 110% 0, 110% 100%, -10% 100%); }
      55%  { clip-path: polygon(-10% 0, 110% 0, 110% 100%, -10% 100%); }
      100% { clip-path: polygon(110% 0, 110% 0, 110% 100%, 110% 100%); }
    }

    /* ═══════════════════════════════════════════════════════════
       重啟結界：滿屏 overlay，月印旋轉 + 軌道字 + 狀態文字
       ═══════════════════════════════════════════════════════════ */
    .restart-overlay {
      position: fixed; inset: 0;
      z-index: 10000;
      background: color-mix(in oklab, var(--paper) 88%, transparent);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
      display: none;
      place-items: center;
      flex-direction: column;
      opacity: 0;
    }
    .restart-overlay.active {
      display: grid;
      animation: ro-fade-in 0.35s ease forwards;
    }
    .restart-overlay.complete {
      animation: ro-fade-out 0.6s ease forwards;
    }
    @keyframes ro-fade-in  { to { opacity: 1; } }
    @keyframes ro-fade-out { to { opacity: 0; } }

    .restart-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 36px;
      padding: 40px 64px;
    }

    .seal-stage {
      position: relative;
      width: 280px; height: 280px;
      display: grid; place-items: center;
    }

    /* 中央方印 */
    .seal-core {
      width: 110px; height: 110px;
      border-radius: 14px;
      border: 3px solid var(--seal);
      display: grid; place-items: center;
      font-family: "Shippori Mincho", serif;
      font-size: 64px;
      color: var(--seal);
      transform: rotate(-6deg);
      background: color-mix(in oklab, var(--seal) 6%, transparent);
      box-shadow:
        0 0 0 0 color-mix(in oklab, var(--seal) 60%, transparent),
        inset 0 0 24px color-mix(in oklab, var(--seal) 14%, transparent);
      animation: seal-pulse 1.6s ease-in-out infinite;
      z-index: 3;
    }
    @keyframes seal-pulse {
      0%, 100% {
        transform: rotate(-6deg) scale(1);
        box-shadow:
          0 0 0 0 color-mix(in oklab, var(--seal) 50%, transparent),
          inset 0 0 24px color-mix(in oklab, var(--seal) 14%, transparent);
      }
      50% {
        transform: rotate(-6deg) scale(1.06);
        box-shadow:
          0 0 30px 4px color-mix(in oklab, var(--seal) 50%, transparent),
          inset 0 0 24px color-mix(in oklab, var(--seal) 24%, transparent);
      }
    }
    .restart-overlay.complete .seal-core {
      animation: seal-burst 0.6s ease forwards;
    }
    @keyframes seal-burst {
      0%   { transform: rotate(-6deg) scale(1); opacity: 1; }
      100% { transform: rotate(-6deg) scale(2.6); opacity: 0; }
    }

    /* 軌道環（虛線圈） */
    .seal-orbit {
      position: absolute;
      border-radius: 50%;
      border: 1px dashed color-mix(in oklab, var(--moon) 60%, transparent);
      animation: orbit-spin linear infinite;
      z-index: 2;
    }
    .seal-orbit.o1 { width: 180px; height: 180px; animation-duration: 6s; }
    .seal-orbit.o2 { width: 230px; height: 230px; animation-duration: 10s; animation-direction: reverse; border-color: color-mix(in oklab, var(--jade) 55%, transparent); }
    .seal-orbit.o3 { width: 280px; height: 280px; animation-duration: 14s; border-style: dotted; border-color: color-mix(in oklab, var(--sakura) 50%, transparent); }
    @keyframes orbit-spin { to { transform: rotate(360deg); } }

    /* 軌道上的字符 */
    .seal-orbit .glyph {
      position: absolute;
      top: -16px; left: 50%;
      transform: translateX(-50%);
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--paper-3);
      border: 1px solid var(--rule);
      display: grid; place-items: center;
      font-family: "Shippori Mincho", serif;
      font-size: 14px;
      color: var(--moon);
      box-shadow: 0 2px 8px color-mix(in oklab, var(--ink) 10%, transparent);
    }
    .seal-orbit.o2 .glyph { color: var(--jade); }
    .seal-orbit.o3 .glyph { color: var(--sakura); }

    /* 中央發光月暈 */
    .seal-glow {
      position: absolute;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle,
        color-mix(in oklab, var(--moon) 22%, transparent) 0%,
        transparent 65%);
      animation: glow-breathe 2.4s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes glow-breathe {
      0%, 100% { transform: scale(0.85); opacity: 0.55; }
      50%      { transform: scale(1.05); opacity: 0.9; }
    }

    .restart-status {
      font-family: "Shippori Mincho", "Noto Serif TC", serif;
      font-size: 24px;
      letter-spacing: 0.42em;
      color: var(--ink);
      text-indent: 0.42em;
    }
    .restart-sub {
      font-family: "Klee One", "Zen Maru Gothic", serif;
      font-size: 12px;
      letter-spacing: 0.32em;
      color: var(--ink-mute);
      text-transform: uppercase;
    }
    .restart-bar {
      width: 240px; height: 2px;
      background: var(--rule);
      border-radius: 2px;
      overflow: hidden;
    }
    .restart-bar::after {
      content: "";
      display: block;
      width: 30%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--moon), transparent);
      animation: restart-bar-slide 1.4s ease-in-out infinite;
    }
    @keyframes restart-bar-slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(440%); }
    }

    @media (max-width: 820px) {
      .app { grid-template-columns: 220px 1fr; }
      .sidebar { padding: 16px 12px; }
      .stage-body { padding: 20px 16px 40px; }
      .mascot-wrap { width: 220px; height: 220px; }
      .mascot { width: 130px; height: 130px; }
      .timer { font-size: 42px; }
      .scroll-card { padding: 22px 20px; }
    }
    @media (max-width: 560px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
